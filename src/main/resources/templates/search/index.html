<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全局搜索 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <h2 class="text-center mb-4"><i class="bi bi-search"></i> 全局搜索</h2>
            
            <!-- 搜索框 -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="input-group input-group-lg">
                        <select class="form-select" id="searchType" style="max-width: 150px;">
                            <option value="student">学生</option>
                            <option value="record">运动记录</option>
                        </select>
                        <input type="text" class="form-control" id="searchKeyword" placeholder="输入搜索关键词...">
                        <button class="btn btn-primary" onclick="performSearch()">
                            <i class="bi bi-search"></i> 搜索
                        </button>
                    </div>
                </div>
            </div>

            <!-- 搜索结果 -->
            <div id="searchResults" style="display: none;">
                <h5 class="mb-3">搜索结果 (<span id="resultCount">0</span>)</h5>
                <div id="resultsList"></div>
            </div>

            <!-- 无结果提示 -->
            <div id="noResults" class="text-center text-muted" style="display: none;">
                <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                <p class="mt-3">未找到相关结果</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
    // 执行搜索
    function performSearch() {
        const keyword = $('#searchKeyword').val();
        const searchType = $('#searchType').val();
        
        if (!keyword) {
            alert('请输入搜索关键词');
            return;
        }
        
        let url = '';
        if (searchType === 'student') {
            url = '/search/students?keyword=' + encodeURIComponent(keyword);
        } else {
            url = '/search/records?keyword=' + encodeURIComponent(keyword);
        }
        
        $.get(url, function(result) {
            if (result.success) {
                displayResults(result.data, searchType);
            } else {
                alert('搜索失败: ' + result.message);
            }
        });
    }

    // 显示搜索结果
    function displayResults(data, type) {
        $('#resultCount').text(data.length);
        
        if (data.length === 0) {
            $('#searchResults').hide();
            $('#noResults').show();
            return;
        }
        
        $('#noResults').hide();
        $('#searchResults').show();
        
        let html = '';
        if (type === 'student') {
            data.forEach(function(student) {
                html += '<div class="card mb-2">' +
                    '<div class="card-body">' +
                    '<h5>' + student.name + '</h5>' +
                    '<p class="mb-1">学号: ' + student.studentNo + '</p>' +
                    '<p class="mb-1">班级: ' + student.className + '</p>' +
                    '<p class="mb-0">积分: ' + student.totalPoints + '</p>' +
                    '</div></div>';
            });
        } else {
            data.forEach(function(record) {
                html += '<div class="card mb-2">' +
                    '<div class="card-body">' +
                    '<h5>' + record.studentName + ' - ' + record.sportType + '</h5>' +
                    '<p class="mb-1">距离: ' + (record.distance || 0) + ' km</p>' +
                    '<p class="mb-1">时长: ' + (record.duration || 0) + ' 分钟</p>' +
                    '<p class="mb-0">步数: ' + (record.steps || 0) + '</p>' +
                    '</div></div>';
            });
        }
        
        $('#resultsList').html(html);
    }

    // 回车搜索
    $('#searchKeyword').on('keypress', function(e) {
        if (e.which === 13) {
            performSearch();
        }
    });
</script>

</body>
</html>
