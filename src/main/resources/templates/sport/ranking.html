<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运动排名 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .ranking-item.current-user {
            background-color: #fff3cd;
            border-left: 4px solid #ffc107;
        }
        .top-three tr:nth-child(1) td { color: #FFD700; font-weight: bold; }
        .top-three tr:nth-child(2) td { color: #C0C0C0; font-weight: bold; }
        .top-three tr:nth-child(3) td { color: #CD7F32; font-weight: bold; }
    </style>
</head>
<body>

<div class="container-fluid mt-4">
    <div class="mb-4">
        <a href="/student/index" class="btn btn-secondary" th:if="${isStudent}">返回学生端</a>
        <a href="/admin/index" class="btn btn-secondary" th:if="${isAdmin}">返回后台</a>
        <a href="/teacher/index" class="btn btn-secondary" th:if="${!isStudent and !isAdmin}">返回后台</a>
        <h3 class="d-inline ms-3">🏆 排名榜单</h3>
    </div>

    <!-- 筛选区域 -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-md-4">
                    <label for="rankingType" class="form-label">排名类型：</label>
                    <select id="rankingType" class="form-select">
                        <option value="points" th:selected="${rankingType == 'points'}">积分排名</option>
                        <option value="sport" th:selected="${rankingType == 'sport'}">运动排名</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="classFilter" class="form-label">选择班级：</label>
                    <select id="classFilter" class="form-select">
                        <option value="">全校排名</option>
                    </select>
                </div>
                <div class="col-md-4 text-end">
                    <label class="form-label d-block">&nbsp;</label>
                    <button class="btn btn-primary" onclick="loadRanking()">
                        <i class="bi bi-search"></i> 查询排名
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 我的排名提示（仅学生可见） -->
    <div class="alert alert-info" th:if="${isStudent}" id="myRankAlert" style="display: none;">
        <strong>🎯 我的排名：</strong>第 <span id="myRank">-</span> 名，
        总积分：<span id="myPoints">-</span> 分
    </div>

    <!-- 排名表格 -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">
                <span id="rankingTitle">全校排名</span>
                <span class="badge bg-success" id="totalCount">共 0 人</span>
            </h5>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                    <tr>
                        <th width="80">排名</th>
                        <th>学号</th>
                        <th>姓名</th>
                        <th>班级</th>
                        <th>运动次数</th>
                        <th>总积分</th>
                    </tr>
                    </thead>
                    <tbody id="rankingTableBody">
                    <tr>
                        <td colspan="6" class="text-center py-5">暂无排名数据</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
/*<![CDATA[*/
let currentClassId = /*[[${classId}]]*/ null;
let isStudent = /*[[${isStudent}]]*/ false;
/*]]>*/

// 页面加载时初始化
document.addEventListener('DOMContentLoaded', function() {
    loadClassList();
    
    // 如果有班级ID，自动选中
    if (currentClassId) {
        document.getElementById('classFilter').value = currentClassId;
    }
    
    // 加载排名数据
    loadRanking();
});

// 加载班级列表
function loadClassList() {
    fetch('/sport/ranking/classes')
        .then(response => {
            if (!response.ok) {
                throw new Error('HTTP error! status: ' + response.status);
            }
            return response.json();
        })
        .then(result => {
            console.log('班级列表数据:', result);
            if (result.success && result.data && result.data.length > 0) {
                const select = document.getElementById('classFilter');
                result.data.forEach(cls => {
                    const option = document.createElement('option');
                    option.value = cls.id;
                    option.textContent = cls.className;
                    select.appendChild(option);
                });
                console.log('班级列表加载成功，共', result.data.length, '个班级');
            } else {
                console.warn('班级列表为空或加载失败:', result);
                alert('警告：未能加载班级列表，请检查数据库中是否有班级数据');
            }
        })
        .catch(error => {
            console.error('加载班级列表失败:', error);
            alert('错误：加载班级列表失败 - ' + error.message);
        });
}

// 加载排名数据
function loadRanking() {
    const classId = document.getElementById('classFilter').value;
    const rankingType = document.getElementById('rankingType').value;
    
    let url = '/sport/ranking/data?type=' + rankingType;
    if (classId) {
        url += '&classId=' + classId;
    }
    
    fetch(url)
        .then(response => response.json())
        .then(result => {
            if (result.success) {
                displayRanking(result.data, classId, result.type);
            } else {
                showError(result.message);
            }
        })
        .catch(error => {
            console.error('加载排名失败:', error);
            showError('加载排名失败，请刷新重试');
        });
}

// 显示排名数据
function displayRanking(data, classId, type) {
    const tbody = document.getElementById('rankingTableBody');
    const title = document.getElementById('rankingTitle');
    const totalCount = document.getElementById('totalCount');
    
    // 更新标题
    const typeText = type === 'points' ? '积分' : '运动';
    title.textContent = classId ? `班级${typeText}排名` : `全校${typeText}排名`;
    totalCount.textContent = `共 ${data.length} 人`;
    
    if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-5">暂无排名数据</td></tr>';
        return;
    }
    
    let html = '';
    let myRankFound = false;
    
    data.forEach((item, index) => {
        const rank = index + 1;
        const isCurrentUser = item.isCurrentUser || false;
        const rowClass = isCurrentUser ? 'ranking-item current-user' : '';
        
        html += `
            <tr class="${rowClass}" ${rank <= 3 ? 'class="top-three"' : ''}>
                <td>
                    ${rank <= 3 ? getMedal(rank) : rank}
                </td>
                <td>${item.studentNo || '-'}</td>
                <td>${item.studentName || '未知'}</td>
                <td>${item.className || '-'}</td>
                <td>${item.recordCount || 0}</td>
                <td><strong>${item.totalPoints || 0}</strong></td>
            </tr>
        `;
        
        // 如果是当前学生，显示我的排名
        if (isCurrentUser && isStudent) {
            document.getElementById('myRank').textContent = rank;
            document.getElementById('myPoints').textContent = item.totalPoints || 0;
            document.getElementById('myRankAlert').style.display = 'block';
            myRankFound = true;
        }
    });
    
    tbody.innerHTML = html;
    
    // 如果没找到当前学生的排名，隐藏提示
    if (!myRankFound && isStudent) {
        document.getElementById('myRankAlert').style.display = 'none';
    }
}

// 获取奖牌图标
function getMedal(rank) {
    if (rank === 1) return '🥇';
    if (rank === 2) return '🥈';
    if (rank === 3) return '🥉';
    return rank;
}

// 显示错误信息
function showError(message) {
    document.getElementById('rankingTableBody').innerHTML = `
        <tr>
            <td colspan="6" class="text-center py-5 text-danger">
                <i class="bi bi-exclamation-triangle"></i> ${message}
            </td>
        </tr>
    `;
}
</script>

</body>
</html>
