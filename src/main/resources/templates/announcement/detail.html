<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${announcement.title} + ' - 系统公告'">公告详情</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <!-- 返回按钮 -->
            <div class="mb-3">
                <a href="/announcement/list" class="btn btn-secondary">
                    <i class="bi bi-arrow-left"></i> 返回列表
                </a>
            </div>

            <!-- 公告卡片 -->
            <div class="card shadow">
                <div class="card-header bg-light">
                    <div class="d-flex justify-content-between align-items-start">
                        <h3 class="card-title mb-0" th:text="${announcement.title}">公告标题</h3>
                        <div>
                            <span th:if="${announcement.type == 'INFO'}" class="badge bg-info fs-6">通知</span>
                            <span th:if="${announcement.type == 'IMPORTANT'}" class="badge bg-warning fs-6">重要</span>
                            <span th:if="${announcement.type == 'URGENT'}" class="badge bg-danger fs-6">紧急</span>
                        </div>
                    </div>
                </div>
                
                <div class="card-body">
                    <!-- 元信息 -->
                    <div class="mb-4 pb-3 border-bottom">
                        <div class="row text-muted">
                            <div class="col-md-4">
                                <i class="bi bi-calendar"></i> 
                                发布时间：<span th:text="${#temporals.format(announcement.createTime, 'yyyy-MM-dd HH:mm:ss')}">2026-05-24 10:00:00</span>
                            </div>
                            <div class="col-md-4">
                                <i class="bi bi-eye"></i> 
                                浏览次数：<span th:text="${announcement.viewCount}">0</span>
                            </div>
                            <div class="col-md-4">
                                <i class="bi bi-flag"></i> 
                                优先级：<span th:text="${announcement.priority}">0</span>
                            </div>
                        </div>
                        
                        <div class="row text-muted mt-2" th:if="${announcement.startTime != null or announcement.endTime != null}">
                            <div class="col-12">
                                <i class="bi bi-clock"></i> 
                                有效期：
                                <span th:if="${announcement.startTime != null}" th:text="${#temporals.format(announcement.startTime, 'yyyy-MM-dd')}"></span>
                                <span th:if="${announcement.startTime != null and announcement.endTime != null}"> 至 </span>
                                <span th:if="${announcement.endTime != null}" th:text="${#temporals.format(announcement.endTime, 'yyyy-MM-dd')}"></span>
                            </div>
                        </div>
                    </div>

                    <!-- 公告内容 -->
                    <div class="announcement-content" th:utext="${announcement.content}">
                        公告内容...
                    </div>
                </div>
                
                <div class="card-footer bg-light">
                    <div class="d-flex justify-content-between align-items-center">
                        <small class="text-muted">
                            本文档由系统自动生成，如有疑问请联系管理员
                        </small>
                        <button class="btn btn-outline-primary btn-sm" onclick="window.print()">
                            <i class="bi bi-printer"></i> 打印
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .announcement-content {
        line-height: 1.8;
        font-size: 16px;
    }
    .announcement-content img {
        max-width: 100%;
        height: auto;
    }
    .announcement-content p {
        margin-bottom: 1rem;
    }
</style>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>

</body>
</html>
