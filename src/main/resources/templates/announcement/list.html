<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统公告 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container mt-4">
    <!-- 页面标题 -->
    <div class="mb-4">
        <a href="javascript:history.back()" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> 返回
        </a>
        <h3 class="d-inline ms-3">📢 系统公告</h3>
    </div>

    <!-- 公告列表 -->
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div th:each="announcement : ${page.records}" class="card mb-3 announcement-item" 
                 th:onclick="'location.href=\'/announcement/detail/' + ${announcement.id} + '\''" style="cursor: pointer;">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title mb-0" th:text="${announcement.title}">公告标题</h5>
                        <div>
                            <span th:if="${announcement.type == 'INFO'}" class="badge bg-info">通知</span>
                            <span th:if="${announcement.type == 'IMPORTANT'}" class="badge bg-warning">重要</span>
                            <span th:if="${announcement.type == 'URGENT'}" class="badge bg-danger">紧急</span>
                        </div>
                    </div>
                    
                    <div class="mb-2">
                        <small class="text-muted">
                            <i class="bi bi-calendar"></i> 
                            <span th:text="${#temporals.format(announcement.createTime, 'yyyy-MM-dd HH:mm')}">2026-05-24 10:00</span>
                            <span class="ms-3">
                                <i class="bi bi-eye"></i> <span th:text="${announcement.viewCount}">0</span> 次浏览
                            </span>
                        </small>
                    </div>

                    <div class="text-muted" style="max-height: 100px; overflow: hidden;">
                        <div th:utext="${#strings.abbreviate(announcement.content, 200)}">公告内容摘要...</div>
                    </div>

                    <div class="mt-2">
                        <small class="text-primary">点击查看详情 →</small>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(page.records)}" class="text-center py-5 text-muted">
                <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                <p class="mt-3">暂无公告</p>
            </div>

            <!-- 分页 -->
            <div class="d-flex justify-content-center mt-4" th:if="${!#lists.isEmpty(page.records)}">
                <nav aria-label="Page navigation">
                    <ul class="pagination">
                        <li class="page-item" th:classappend="${page.current == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/announcement/list(page=${page.current - 1}, size=${page.size})}">上一页</a>
                        </li>
                        <li class="page-item disabled">
                            <span class="page-link">第 [[${page.current}]] / [[${page.pages}]] 页</span>
                        </li>
                        <li class="page-item" th:classappend="${page.current == page.pages} ? 'disabled'">
                            <a class="page-link" th:href="@{/announcement/list(page=${page.current + 1}, size=${page.size})}">下一页</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>

</body>
</html>
