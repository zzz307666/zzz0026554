<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师页面 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
</head>
<body>

<div class="operation-panel">
    <h2 class="operation-title">教师工作台</h2>
    <div class="mb-3">
        <span>当前登录：<b th:text="${realName}"></b>（教师）</span>
        <a href="/logout" class="btn btn-danger logout-btn">安全登出</a>
    </div>

    <div class="operation-card">
        <a href="/teacher/class/manage" class="card-item text-decoration-none">
            <div class="card-icon">🏫</div>
            <div class="card-text">我的班级</div>
        </a>
        <a href="/teacher/sport/audit" class="card-item text-decoration-none">
            <div class="card-icon">✅</div>
            <div class="card-text">运动审核</div>
        </a>
        <a href="/teacher/evaluation/list" class="card-item text-decoration-none">
            <div class="card-icon">⭐</div>
            <div class="card-text">学生评价</div>
        </a>
        <a href="/teacher/class/stats" class="card-item text-decoration-none">
            <div class="card-icon">📊</div>
            <div class="card-text">班级统计</div>
        </a>
        <a href="/teacher/messages" class="card-item text-decoration-none">
            <div class="card-icon">📬</div>
            <div class="card-text">消息中心</div>
        </a>
        <a href="/student/ranking" class="card-item text-decoration-none">
            <div class="card-icon">🏆</div>
            <div class="card-text">班级排名</div>
        </a>
    </div>
    <div class="mt-5">
        <a href="/" class="btn btn-secondary">退出到登录页</a>
    </div>
</div>

</body>
</html>
