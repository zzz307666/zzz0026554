<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的班级 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
</head>
<body>

<div class="operation-panel">
    <h2 class="operation-title">我的任职班级</h2>
    <div class="mb-4">
        <a th:href="${isAdmin} ? '/admin/index' : '/teacher/index'" 
           class="btn btn-secondary">返回后台</a>
        <a href="/" class="btn btn-outline-secondary">退出到登录页</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>#</th>
                <th>年级</th>
                <th>班级名称</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(classList)}">
                <td colspan="4" class="text-center py-5">暂无任职班级数据</td>
            </tr>
            <tr th:each="cls, stat : ${classList}" th:unless="${#lists.isEmpty(classList)}">
                <td th:text="${stat.count}"></td>
                <td><span class="badge bg-primary" th:text="${cls.grade}"></span></td>
                <td th:text="${cls.className}"></td>
                <td>
                    <a th:href="@{/teacher/class/student/{classId}(classId=${cls.id})}" class="btn btn-primary btn-sm">
                        <i class="bi bi-people"></i> 查看学生
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
