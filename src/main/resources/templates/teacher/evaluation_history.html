<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评价历史记录 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container-fluid mt-4">
    <!-- 页面标题 -->
    <div class="mb-4 d-flex justify-content-between align-items-center">
        <div>
            <a href="/teacher/index" class="btn btn-secondary">返回教师首页</a>
            <h3 class="d-inline ms-3">📝 评价历史记录</h3>
        </div>
        <a th:href="@{/teacher/evaluation/export(period=${currentPeriod}, classId=${currentClassId})}" 
           class="btn btn-success">
            <i class="bi bi-download"></i> 导出CSV
        </a>
    </div>

    <!-- 筛选条件 -->
    <div class="card mb-4">
        <div class="card-body">
            <form class="row g-3" method="get" action="/teacher/evaluation/history">
                <div class="col-md-4">
                    <label class="form-label">学期</label>
                    <select class="form-select" name="period">
                        <option value="">全部学期</option>
                        <option value="2025-2026-1" th:selected="${currentPeriod == '2025-2026-1'}">2025-2026学年第1学期</option>
                        <option value="2025-2026-2" th:selected="${currentPeriod == '2025-2026-2'}">2025-2026学年第2学期</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">班级</label>
                    <select class="form-select" name="classId">
                        <option value="">全部班级</option>
                        <!-- TODO: 动态加载教师所教班级 -->
                        <option value="1" th:selected="${currentClassId == 1}">22本科计科三班</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">&nbsp;</label>
                    <div class="d-grid gap-2 d-md-flex">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="bi bi-search"></i> 查询
                        </button>
                        <a href="/teacher/evaluation/history" class="btn btn-secondary">重置</a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- 评价列表 -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">评价列表（共 [[${page.total}]] 条）</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>学号</th>
                            <th>姓名</th>
                            <th>班级</th>
                            <th>学期</th>
                            <th>耐力</th>
                            <th>力量</th>
                            <th>速度</th>
                            <th>柔韧</th>
                            <th>协调</th>
                            <th>总分</th>
                            <th>等级</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="eval : ${page.records}">
                            <td th:text="${eval.studentNo}">S2026001</td>
                            <td th:text="${eval.studentName}">-</td>
                            <td th:text="${eval.className}">22本科计科三班</td>
                            <td th:text="${eval.period}">2025-2026-1</td>
                            <td th:text="${eval.enduranceScore}">85</td>
                            <td th:text="${eval.strengthScore}">78</td>
                            <td th:text="${eval.speedScore}">92</td>
                            <td th:text="${eval.flexibilityScore}">70</td>
                            <td th:text="${eval.coordinationScore}">88</td>
                            <td class="fw-bold" th:text="${eval.totalScore}">83.2</td>
                            <td>
                                <span class="badge bg-success" th:if="${eval.gradeLevel == '优秀'}">优秀</span>
                                <span class="badge bg-primary" th:if="${eval.gradeLevel == '良好'}">良好</span>
                                <span class="badge bg-warning" th:if="${eval.gradeLevel == '中等'}">中等</span>
                                <span class="badge bg-danger" th:if="${eval.gradeLevel == '及格'}">及格</span>
                                <span class="badge bg-secondary" th:if="${eval.gradeLevel == '不及格'}">不及格</span>
                            </td>
                            <td>
                                <span class="badge bg-secondary" th:if="${eval.status == 1}">已发布</span>
                                <span class="badge bg-success" th:if="${eval.status == 0 or eval.status == null}">草稿</span>
                            </td>
                            <td>
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/teacher/evaluation/detail/{id}(id=${eval.id})}" 
                                       class="btn btn-outline-primary">
                                        <i class="bi bi-eye"></i> 查看
                                    </a>
                                    <button class="btn btn-outline-warning" 
                                            th:if="${eval.status == 0 or eval.status == null}"
                                            th:onclick="'editEvaluation(' + ${eval.id} + ')'">
                                        <i class="bi bi-pencil"></i> 编辑
                                    </button>
                                </div>
                            </td>
                        </tr>
                        
                        <tr th:if="${#lists.isEmpty(page.records)}">
                            <td colspan="12" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                                <p class="mt-3">暂无评价记录</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 分页 -->
    <div class="d-flex justify-content-center mt-4" th:if="${!#lists.isEmpty(page.records)}">
        <nav aria-label="Page navigation">
            <ul class="pagination">
                <li class="page-item" th:classappend="${page.current == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/teacher/evaluation/history(page=${page.current - 1}, size=${page.size}, period=${currentPeriod}, classId=${currentClassId})}">上一页</a>
                </li>
                <li class="page-item disabled">
                    <span class="page-link">第 [[${page.current}]] / [[${page.pages}]] 页</span>
                </li>
                <li class="page-item" th:classappend="${page.current == page.pages} ? 'disabled'">
                    <a class="page-link" th:href="@{/teacher/evaluation/history(page=${page.current + 1}, size=${page.size}, period=${currentPeriod}, classId=${currentClassId})}">下一页</a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<!-- 编辑评价模态框 -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑评价</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editForm">
                    <input type="hidden" name="id" id="editId">
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">耐力分数</label>
                            <input type="number" class="form-control" name="enduranceScore" min="0" max="100" step="0.1">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">力量分数</label>
                            <input type="number" class="form-control" name="strengthScore" min="0" max="100" step="0.1">
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">速度分数</label>
                            <input type="number" class="form-control" name="speedScore" min="0" max="100" step="0.1">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">柔韧分数</label>
                            <input type="number" class="form-control" name="flexibilityScore" min="0" max="100" step="0.1">
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">协调分数</label>
                            <input type="number" class="form-control" name="coordinationScore" min="0" max="100" step="0.1">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">评语</label>
                        <textarea class="form-control" name="comment" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveEvaluation()">保存</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
    // 编辑评价
    function editEvaluation(id) {
        fetch(`/teacher/evaluation/detail/${id}`)
        .then(response => response.text())
        .then(html => {
            // 这里应该解析详情页面获取数据，简化处理直接打开模态框
            new bootstrap.Modal(document.getElementById('editModal')).show();
        });
    }

    // 保存评价
    function saveEvaluation() {
        const form = document.getElementById('editForm');
        const formData = new FormData(form);
        
        const data = {
            id: formData.get('id'),
            enduranceScore: parseFloat(formData.get('enduranceScore')),
            strengthScore: parseFloat(formData.get('strengthScore')),
            speedScore: parseFloat(formData.get('speedScore')),
            flexibilityScore: parseFloat(formData.get('flexibilityScore')),
            coordinationScore: parseFloat(formData.get('coordinationScore')),
            comment: formData.get('comment')
        };

        fetch('/teacher/evaluation/update', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
            alert(result.message);
            if (result.success) {
                location.reload();
            }
        })
        .catch(error => alert('保存失败: ' + error.message));
    }
</script>

</body>
</html>
