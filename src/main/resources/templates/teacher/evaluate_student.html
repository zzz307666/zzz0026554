<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评价学生 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .score-slider {
            width: 100%;
        }
        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #10b981;
        }
        .total-score-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
        }
        .grade-badge {
            font-size: 2rem;
            padding: 10px 30px;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="mb-4">
        <a th:href="${isAdmin} ? '/admin/index' : '/teacher/index'" 
           class="btn btn-secondary">返回后台</a>
        <a href="/teacher/evaluation/list" class="btn btn-outline-primary">评价列表</a>
    </div>

    <div class="row">
        <div class="col-md-8">
            <!-- 学生运动信息卡片 -->
            <div class="card shadow mb-4" th:if="${sportRecords != null and !sportRecords.isEmpty()}">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="bi bi-activity"></i> 学生运动数据</h5>
                </div>
                <div class="card-body">
                    <div class="row text-center mb-3">
                        <div class="col-md-4">
                            <div class="p-3 bg-light rounded">
                                <h6 class="text-muted mb-1">运动次数</h6>
                                <h3 class="mb-0 text-primary" th:text="${sportStats?.total_count ?: 0}">0</h3>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="p-3 bg-light rounded">
                                <h6 class="text-muted mb-1">总时长(分钟)</h6>
                                <h3 class="mb-0 text-success" th:text="${sportStats?.total_duration ?: 0}">0</h3>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="p-3 bg-light rounded">
                                <h6 class="text-muted mb-1">总积分</h6>
                                <h3 class="mb-0 text-warning" th:text="${sportStats?.total_points ?: 0}">0</h3>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 最近运动记录 -->
                    <h6 class="fw-bold mb-2">最近运动记录：</h6>
                    <div class="table-responsive">
                        <table class="table table-sm table-hover">
                            <thead class="table-light">
                                <tr>
                                    <th>日期</th>
                                    <th>类型</th>
                                    <th>时长</th>
                                    <th>积分</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="record, stat : ${sportRecords}" th:if="${stat.count <= 5}">
                                    <td th:text="${#temporals.format(record.recordDate, 'MM-dd')}">05-10</td>
                                    <td th:text="${record.sportTypeName ?: '-'}">跑步</td>
                                    <td th:text="${record.duration} + '分钟'">60分钟</td>
                                    <td><span class="badge bg-success" th:text="${record.earnedPoints}">20</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="bi bi-pencil-square"></i> 
                        评价学生：<span<td th:text="${user != null and user.realName != null and !user.realName.isEmpty() ? user.realName : '未设置姓名'}">未设置姓名</td>
                        <small class="ms-2" th:text="'(' + ${student.studentNo} + ')'">S2026001</small>
                    </h4>
                </div>
                <div class="card-body">
                    <form id="evaluationForm">
                        <input type="hidden" id="studentId" th:value="${student.id}">
                        <input type="hidden" id="evaluationId" th:value="${existingEvaluation?.id}">

                        <div class="mb-3">
                            <label class="form-label">评价周期</label>
                            <select class="form-select" id="evaluationPeriod" required>
                                <option value="2024-2025-1" th:selected="${existingEvaluation?.evaluationPeriod == '2024-2025-1'}">2024-2025学年第一学期</option>
                                <option value="2024-2025-2" th:selected="${existingEvaluation?.evaluationPeriod == '2024-2025-2'}">2024-2025学年第二学期</option>
                            </select>
                        </div>

                        <!-- 5维评分 -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">耐力评分（权重25%）</label>
                            <div class="d-flex align-items-center gap-3">
                                <input type="range" class="score-slider" id="enduranceScore" min="0" max="100" 
                                       step="1" th:value="${existingEvaluation?.enduranceScore ?: 75}"
                                       oninput="updateScore('endurance', this.value)">
                                <span class="score-value" id="enduranceValue" th:text="${existingEvaluation?.enduranceScore ?: 75}">75</span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">力量评分（权重20%）</label>
                            <div class="d-flex align-items-center gap-3">
                                <input type="range" class="score-slider" id="strengthScore" min="0" max="100" 
                                       step="1" th:value="${existingEvaluation?.strengthScore ?: 75}"
                                       oninput="updateScore('strength', this.value)">
                                <span class="score-value" id="strengthValue" th:text="${existingEvaluation?.strengthScore ?: 75}">75</span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">速度评分（权重20%）</label>
                            <div class="d-flex align-items-center gap-3">
                                <input type="range" class="score-slider" id="speedScore" min="0" max="100" 
                                       step="1" th:value="${existingEvaluation?.speedScore ?: 75}"
                                       oninput="updateScore('speed', this.value)">
                                <span class="score-value" id="speedValue" th:text="${existingEvaluation?.speedScore ?: 75}">75</span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">柔韧评分（权重15%）</label>
                            <div class="d-flex align-items-center gap-3">
                                <input type="range" class="score-slider" id="flexibilityScore" min="0" max="100" 
                                       step="1" th:value="${existingEvaluation?.flexibilityScore ?: 75}"
                                       oninput="updateScore('flexibility', this.value)">
                                <span class="score-value" id="flexibilityValue" th:text="${existingEvaluation?.flexibilityScore ?: 75}">75</span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">协调评分（权重20%）</label>
                            <div class="d-flex align-items-center gap-3">
                                <input type="range" class="score-slider" id="coordinationScore" min="0" max="100" 
                                       step="1" th:value="${existingEvaluation?.coordinationScore ?: 75}"
                                       oninput="updateScore('coordination', this.value)">
                                <span class="score-value" id="coordinationValue" th:text="${existingEvaluation?.coordinationScore ?: 75}">75</span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">教师评语</label>
                            <textarea class="form-control" id="teacherComment" rows="4" 
                                      placeholder="填写对学生的评价和建议..."
                                      th:text="${existingEvaluation?.teacherComment}"></textarea>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="button" class="btn btn-secondary" onclick="calculateTotal()">
                                <i class="bi bi-calculator"></i> 计算总分
                            </button>
                            <button type="button" class="btn btn-primary" onclick="saveDraft()">
                                <i class="bi bi-save"></i> 保存草稿
                            </button>
                            <button type="button" class="btn btn-success" onclick="publishEvaluation()">
                                <i class="bi bi-send"></i> 发布评价
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <!-- 总分卡片 -->
            <div class="total-score-card shadow mb-4">
                <h5>综合总分</h5>
                <div class="score-value display-1 my-3" id="totalScore">0.00</div>
                <div id="gradeLevel">
                    <span class="badge grade-badge bg-secondary">未计算</span>
                </div>
            </div>

            <!-- 评分说明 -->
            <div class="card shadow">
                <div class="card-header bg-light">
                    <h6 class="mb-0"><i class="bi bi-info-circle"></i> 评分说明</h6>
                </div>
                <div class="card-body">
                    <ul class="mb-0">
                        <li><strong>优秀</strong>: ≥90分</li>
                        <li><strong>良好</strong>: ≥80分</li>
                        <li><strong>中等</strong>: ≥70分</li>
                        <li><strong>及格</strong>: ≥60分</li>
                        <li><strong>不及格</strong>: <60分</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
    // 更新单个分数显示
    function updateScore(type, value) {
        document.getElementById(type + 'Value').textContent = value;
        calculateTotal();
    }

    // 计算总分
    function calculateTotal() {
        const endurance = parseFloat(document.getElementById('enduranceScore').value);
        const strength = parseFloat(document.getElementById('strengthScore').value);
        const speed = parseFloat(document.getElementById('speedScore').value);
        const flexibility = parseFloat(document.getElementById('flexibilityScore').value);
        const coordination = parseFloat(document.getElementById('coordinationScore').value);

        // 加权计算
        const total = (endurance * 0.25 + strength * 0.20 + speed * 0.20 + 
                      flexibility * 0.15 + coordination * 0.20).toFixed(2);

        document.getElementById('totalScore').textContent = total;

        // 判定等级
        let grade = '';
        let badgeClass = '';
        
        if (total >= 90) {
            grade = '优秀';
            badgeClass = 'bg-success';
        } else if (total >= 80) {
            grade = '良好';
            badgeClass = 'bg-info';
        } else if (total >= 70) {
            grade = '中等';
            badgeClass = 'bg-primary';
        } else if (total >= 60) {
            grade = '及格';
            badgeClass = 'bg-warning';
        } else {
            grade = '不及格';
            badgeClass = 'bg-danger';
        }

        document.getElementById('gradeLevel').innerHTML = 
            `<span class="badge grade-badge ${badgeClass}">${grade}</span>`;
    }

    // 保存草稿
    function saveDraft() {
        submitEvaluation(false);
    }

    // 发布评价
    function publishEvaluation() {
        if (!confirm('确定要发布评价吗？发布后学生将可见。')) {
            return;
        }
        submitEvaluation(true);
    }

    // 提交评价
    function submitEvaluation(isPublish) {
        const evaluationId = document.getElementById('evaluationId').value;
        
        const data = {
            id: evaluationId || null,
            studentId: parseInt(document.getElementById('studentId').value),
            evaluationPeriod: document.getElementById('evaluationPeriod').value,
            enduranceScore: parseFloat(document.getElementById('enduranceScore').value),
            strengthScore: parseFloat(document.getElementById('strengthScore').value),
            speedScore: parseFloat(document.getElementById('speedScore').value),
            flexibilityScore: parseFloat(document.getElementById('flexibilityScore').value),
            coordinationScore: parseFloat(document.getElementById('coordinationScore').value),
            teacherComment: document.getElementById('teacherComment').value
        };

        fetch('/teacher/evaluation/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
            if (result.success) {
                if (!evaluationId) {
                    document.getElementById('evaluationId').value = result.evaluationId;
                }
                
                if (isPublish) {
                    return fetch(`/teacher/evaluation/publish/${result.evaluationId}`, {
                        method: 'POST'
                    }).then(res => res.json());
                } else {
                    alert(isPublish ? '发布成功！' : '草稿保存成功！');
                    window.location.href = '/teacher/evaluation/list';
                }
            } else {
                alert('操作失败：' + result.message);
            }
        })
        .catch(error => {
            alert('请求失败：' + error.message);
        });
    }

    // 页面加载时计算一次总分
    window.onload = calculateTotal;
</script>

</body>
</html>
