<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级学生列表 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .action-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        .modal-header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border-radius: 0.5rem 0.5rem 0 0;
        }
        .modal-header .btn-close {
            filter: brightness(0) invert(1);
        }
        .required::after {
            content: " *";
            color: #ef4444;
        }
    </style>
</head>
<body>

<div class="operation-panel">
    <h2 class="operation-title">
        <span th:text="${sysClass.grade + '-' + sysClass.className}"></span> - 学生列表
    </h2>
    <!-- 导航按钮 -->
    <div class="mb-4 d-flex flex-wrap gap-2 align-items-center">
        <a href="/teacher/class/manage" class="btn btn-secondary">返回班级列表</a>
        <a th:href="${isAdmin} ? '/admin/index' : '/teacher/index'" 
           class="btn btn-outline-secondary">返回后台</a>
        <!-- 新增学生按钮 -->
        <button type="button" class="btn btn-success ms-auto" data-bs-toggle="modal" data-bs-target="#addStudentModal">
            <i class="bi bi-plus-circle"></i> 新增学生
        </button>
    </div>

    <!-- 搜索表单 -->
    <div class="search-form">
        <form th:action="@{/teacher/class/student/{classId}(classId=${classId})}" method="get" class="row g-3">
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" name="realName"
                           th:value="${searchRealName}" placeholder="学生姓名">
                </div>
            </div>
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-id-card"></i></span>
                    <input type="text" class="form-control" name="studentNo"
                           th:value="${searchStudentNo}" placeholder="学生学号">
                </div>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-search"></i> 搜索
                </button>
            </div>
            <div class="col-md-2">
                <a th:href="@{/teacher/class/student/{classId}(classId=${classId})}" class="btn btn-secondary w-100">
                    <i class="bi bi-arrow-clockwise"></i> 重置
                </a>
            </div>
        </form>
    </div>

    <!-- 学生列表表格 -->
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>#</th>
                <th>学号</th>
                <th>姓名</th>
                <th>用户名</th>
                <th>性别</th>
                <th>手机号</th>
                <th>出生日期</th>
                <th>账号状态</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <!-- 空数据状态 -->
            <tr th:if="${#lists.isEmpty(studentList)}">
                <td colspan="9" class="text-center py-5">
                    <div class="empty-state">
                        <i class="bi bi-people" style="font-size: 48px;"></i>
                        <h4 class="mt-3 mb-2">暂无学生数据</h4>
                        <p class="text-muted">点击右上角「新增学生」添加该班级的学生</p>
                    </div>
                </td>
            </tr>
            <!-- 学生数据循环 -->
            <tr th:each="student, stat : ${studentList}" th:unless="${#lists.isEmpty(studentList)}">
                <td th:text="${stat.count}"></td>
                <td><span class="badge bg-primary" th:text="${student.studentNo}"></span></td>
                <td th:text="${student.realName}"></td>
                <td th:text="${student.username}"></td>
                <td>
                    <span th:if="${student.gender == 1}">
                        <i class="bi bi-gender-male text-primary"></i> 男
                    </span>
                    <span th:if="${student.gender == 2}">
                        <i class="bi bi-gender-female text-danger"></i> 女
                    </span>
                    <span th:if="${student.gender == 0}">
                        <i class="bi bi-gender-ambiguous text-secondary"></i> 未知
                    </span>
                </td>
                <td th:text="${student.phone}"></td>
                <td th:text="${student.birthDate != null ? #temporals.format(student.birthDate, 'yyyy-MM-dd') : '-'}"></td>
                <td>
                    <span th:if="${student.status == 1}" class="badge bg-success">正常</span>
                    <span th:if="${student.status == 0}" class="badge bg-danger">禁用</span>
                </td>
                <td>
                    <div class="action-buttons">
                        <!-- 编辑按钮 -->
                        <button type="button" class="btn btn-warning btn-sm"
                                th:onclick="'openEditModal(' + ${student.userId} + ')'">
                            <i class="bi bi-pencil"></i> 编辑
                        </button>
                        <!-- 重置密码 -->
                        <button type="button" class="btn btn-info btn-sm"
                                th:onclick="'resetPassword(' + ${student.userId} + ')'">
                            <i class="bi bi-key"></i> 重置密码
                        </button>
                        <!-- 删除按钮 -->
                        <button type="button" class="btn btn-danger btn-sm"
                                th:onclick="'deleteStudent(' + ${student.userId} + ')'">
                            <i class="bi bi-trash"></i> 删除
                        </button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 新增学生模态框 -->
<div class="modal fade" id="addStudentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-plus-circle"></i> 新增班级学生
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addStudentForm">
                    <input type="hidden" id="addClassId" th:value="${classId}">
                    <div class="row">
                        <div class="col-md-6">
                            <h5 class="mb-3" style="color: #4f46e5;">账号信息</h5>
                            <div class="mb-3">
                                <label class="form-label required">用户名</label>
                                <input type="text" class="form-control" id="addUsername" name="username" required placeholder="登录用户名，不可重复">
                            </div>
                            <div class="mb-3">
                                <label class="form-label required">真实姓名</label>
                                <input type="text" class="form-control" id="addRealName" name="realName" required placeholder="学生真实姓名">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">手机号</label>
                                <input type="tel" class="form-control" id="addPhone" name="phone" placeholder="学生手机号">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">邮箱</label>
                                <input type="email" class="form-control" id="addEmail" name="email" placeholder="学生邮箱">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h5 class="mb-3" style="color: #4f46e5;">学生信息</h5>
                            <div class="mb-3">
                                <label class="form-label">所属班级</label>
                                <input type="text" class="form-control" th:value="${sysClass.grade + '-' + sysClass.className}" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">性别</label>
                                <div class="d-flex gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="addGender" id="addGender1" value="1" checked>
                                        <label class="form-check-label" for="addGender1">男</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="addGender" id="addGender2" value="2">
                                        <label class="form-check-label" for="addGender2">女</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="addGender" id="addGender0" value="0">
                                        <label class="form-check-label" for="addGender0">未知</label>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">出生日期</label>
                                <input type="date" class="form-control" id="addBirthDate" name="birthDate">
                            </div>
                            <div class="alert alert-info">
                                <small>
                                    <i class="bi bi-info-circle-fill"></i> 初始密码默认为 <strong>abc123</strong>，学生可自行修改
                                </small>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-success" id="addSubmitBtn" onclick="submitAddStudent()">
                    <span id="addSubmitText">确认添加</span>
                    <span id="addLoading" class="loading-spinner" style="display: none; margin-left: 8px;"></span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 编辑学生模态框 -->
<div class="modal fade" id="editStudentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-pencil"></i> 编辑学生信息
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="editStudentForm">
                    <input type="hidden" id="editUserId">
                    <input type="hidden" id="editStudentId">
                    <div class="row">
                        <div class="col-md-6">
                            <h5 class="mb-3" style="color: #4f46e5;">账号信息</h5>
                            <div class="mb-3">
                                <label class="form-label required">用户名</label>
                                <input type="text" class="form-control" id="editUsername" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label required">真实姓名</label>
                                <input type="text" class="form-control" id="editRealName" name="realName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">手机号</label>
                                <input type="tel" class="form-control" id="editPhone" name="phone">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">邮箱</label>
                                <input type="email" class="form-control" id="editEmail" name="email">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">账号状态</label>
                                <select class="form-control" id="editStatus" name="status">
                                    <option value="1">正常</option>
                                    <option value="0">禁用</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h5 class="mb-3" style="color: #4f46e5;">学生信息</h5>
                            <div class="mb-3">
                                <label class="form-label">学生学号</label>
                                <input type="text" class="form-control" id="editStudentNo" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">所属班级</label>
                                <input type="text" class="form-control" th:value="${sysClass.grade + '-' + sysClass.className}" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">性别</label>
                                <div class="d-flex gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="editGender" id="editGender1" value="1">
                                        <label class="form-check-label" for="editGender1">男</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="editGender" id="editGender2" value="2">
                                        <label class="form-check-label" for="editGender2">女</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="editGender" id="editGender0" value="0">
                                        <label class="form-check-label" for="editGender0">未知</label>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">出生日期</label>
                                <input type="date" class="form-control" id="editBirthDate" name="birthDate">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-warning" id="editSubmitBtn" onclick="submitEditStudent()">
                    <span id="editSubmitText">保存修改</span>
                    <span id="editLoading" class="loading-spinner" style="display: none; margin-left: 8px;"></span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 引入Bootstrap JS -->
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<!-- 关键修复：添加th:inline="javascript" 开启Thymeleaf JS内联 -->
<script th:inline="javascript">
    // 全局班级ID，Thymeleaf会自动解析替换为实际数值
    const classId = /*[[${classId}]]*/ 0;
    // 模态框实例
    const addModal = new bootstrap.Modal(document.getElementById('addStudentModal'));
    const editModal = new bootstrap.Modal(document.getElementById('editStudentModal'));

    // 新增学生提交
    function submitAddStudent() {
        // 构建请求数据
        const formData = {
            user: {
                username: document.getElementById('addUsername').value,
                realName: document.getElementById('addRealName').value,
                phone: document.getElementById('addPhone').value || '',
                email: document.getElementById('addEmail').value || ''
            },
            student: {
                classId: document.getElementById('addClassId').value,
                gender: document.querySelector('input[name="addGender"]:checked').value,
                birthDate: document.getElementById('addBirthDate').value || ''
            }
        };

        // 按钮加载状态
        const submitBtn = document.getElementById('addSubmitBtn');
        submitBtn.disabled = true;
        document.getElementById('addSubmitText').textContent = '提交中...';
        document.getElementById('addLoading').style.display = 'inline-block';

        // 发送请求
        fetch('/teacher/class/student/add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(formData)
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert(data.message);
                    addModal.hide();
                    // 重置表单
                    document.getElementById('addStudentForm').reset();
                    location.reload(); // 刷新页面
                } else {
                    alert('添加失败：' + data.message);
                }
            })
            .catch(err => alert('请求失败：' + err.message))
            .finally(() => {
                submitBtn.disabled = false;
                document.getElementById('addSubmitText').textContent = '确认添加';
                document.getElementById('addLoading').style.display = 'none';
            });
    }

    // 打开编辑模态框，回显数据
    function openEditModal(userId) {
        fetch('/teacher/class/student/detail/' + userId)
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const user = data.user;
                    const student = data.student;

                    // 回显数据
                    document.getElementById('editUserId').value = user.id;
                    document.getElementById('editStudentId').value = student.id;
                    document.getElementById('editUsername').value = user.username;
                    document.getElementById('editRealName').value = user.realName;
                    document.getElementById('editPhone').value = user.phone || '';
                    document.getElementById('editEmail').value = user.email || '';
                    document.getElementById('editStatus').value = user.status;
                    document.getElementById('editStudentNo').value = student.studentNo;
                    document.getElementById('editBirthDate').value = student.birthDate || '';

                    // 性别单选框回显
                    document.querySelectorAll('input[name="editGender"]').forEach(radio => {
                        radio.checked = radio.value == student.gender;
                    });

                    // 打开模态框
                    editModal.show();
                } else {
                    alert('获取学生信息失败：' + data.message);
                }
            })
            .catch(err => alert('请求失败：' + err.message));
    }

    // 编辑学生提交
    function submitEditStudent() {
        // 构建请求数据
        const formData = {
            user: {
                id: document.getElementById('editUserId').value,
                username: document.getElementById('editUsername').value,
                realName: document.getElementById('editRealName').value,
                phone: document.getElementById('editPhone').value || '',
                email: document.getElementById('editEmail').value || '',
                status: document.getElementById('editStatus').value
            },
            student: {
                id: document.getElementById('editStudentId').value,
                studentNo: document.getElementById('editStudentNo').value,
                gender: document.querySelector('input[name="editGender"]:checked').value,
                birthDate: document.getElementById('editBirthDate').value || ''
            }
        };

        // 按钮加载状态
        const submitBtn = document.getElementById('editSubmitBtn');
        submitBtn.disabled = true;
        document.getElementById('editSubmitText').textContent = '保存中...';
        document.getElementById('editLoading').style.display = 'inline-block';

        // 发送请求
        fetch('/teacher/class/student/edit', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(formData)
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert(data.message);
                    editModal.hide();
                    location.reload();
                } else {
                    alert('修改失败：' + data.message);
                }
            })
            .catch(err => alert('请求失败：' + err.message))
            .finally(() => {
                submitBtn.disabled = false;
                document.getElementById('editSubmitText').textContent = '保存修改';
                document.getElementById('editLoading').style.display = 'none';
            });
    }

    // 删除学生
    function deleteStudent(userId) {
        if (confirm('确认删除该学生吗？此操作将永久删除学生账号及所有关联数据，不可恢复！')) {
            fetch('/teacher/class/student/delete/' + userId, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                    if (data.success) location.reload();
                })
                .catch(err => alert('操作失败：' + err.message));
        }
    }

    // 重置学生密码
    function resetPassword(userId) {
        if (confirm('确认将该学生的密码重置为 abc123 吗？')) {
            fetch('/teacher/class/student/reset-password/' + userId, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            })
                .then(res => res.json())
                .then(data => alert(data.message))
                .catch(err => alert('操作失败：' + err.message));
        }
    }

    // 页面加载时设置默认出生日期
    window.onload = function() {
        const today = new Date();
        const defaultDate = new Date(today.getFullYear() - 18, today.getMonth(), today.getDate());
        document.getElementById('addBirthDate').value = defaultDate.toISOString().split('T')[0];

        // 模态框关闭时重置表单
        document.getElementById('addStudentModal').addEventListener('hidden.bs.modal', function () {
            document.getElementById('addStudentForm').reset();
            const today = new Date();
            const defaultDate = new Date(today.getFullYear() - 18, today.getMonth(), today.getDate());
            document.getElementById('addBirthDate').value = defaultDate.toISOString().split('T')[0];
        });
    };
</script>

</body>
</html>
