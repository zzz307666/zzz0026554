<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运动审核 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container-fluid mt-4">
    <div class="mb-4">
        <a th:href="${isAdmin} ? '/admin/index' : '/teacher/index'" 
           class="btn btn-secondary">返回后台</a>
        <span class="badge bg-danger ms-2" th:text="'待审核: ' + ${pendingCount}">待审核: 0</span>
    </div>

    <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="bi bi-clipboard-check"></i> 运动打卡审核</h4>
            <div>
                <button class="btn btn-light btn-sm" onclick="batchAudit(1)">
                    <i class="bi bi-check-all"></i> 批量通过
                </button>
                <button class="btn btn-light btn-sm" onclick="batchAudit(2)">
                    <i class="bi bi-x-circle"></i> 批量驳回
                </button>
            </div>
        </div>
        <div class="card-body">
            <!-- 筛选条件 -->
            <form class="row g-3 mb-4" method="get" action="/teacher/sport/audit">
                <div class="col-md-3">
                    <select class="form-select" name="status">
                        <option value="" th:selected="${status == null}">全部状态</option>
                        <option value="0" th:selected="${status == 0}">待审核</option>
                        <option value="1" th:selected="${status == 1}">已通过</option>
                        <option value="2" th:selected="${status == 2}">已驳回</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="date" class="form-control" name="startDate" placeholder="开始日期"
                           th:value="${startDate}">
                </div>
                <div class="col-md-3">
                    <input type="date" class="form-control" name="endDate" placeholder="结束日期"
                           th:value="${endDate}">
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> 查询
                    </button>
                </div>
            </form>

            <!-- 数据表格 -->
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th><input type="checkbox" id="selectAll"></th>
                            <th>学生姓名</th>
                            <th>学号</th>
                            <th>运动类型</th>
                            <th>运动日期</th>
                            <th>时长(分钟)</th>
                            <th>距离(米)</th>
                            <th>卡路里</th>
                            <th>预估积分</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="record : ${page.records}">
                            <td>
                                <input type="checkbox" class="record-checkbox" 
                                       th:value="${record.id}" th:disabled="${record.status != 0}">
                            </td>
                            <td th:text="${record.studentName ?: '-'}">-</td>
                            <td th:text="${record.studentNo ?: '-'}">S2026001</td>
                            <td th:text="${record.sportTypeName ?: '-'}">跑步</td>
                            <td th:text="${#temporals.format(record.recordDate, 'yyyy-MM-dd')}">2026-05-10</td>
                            <td th:text="${record.duration}">60</td>
                            <td th:text="${record.distance ?: 0}">5000</td>
                            <td th:text="${record.calories ?: 0}">300</td>
                            <td>
                                <span class="badge bg-success" th:text="${record.earnedPoints}">20.00</span>
                            </td>
                            <td>
                                <span th:if="${record.status == 0}" class="badge bg-warning">待审核</span>
                                <span th:if="${record.status == 1}" class="badge bg-success">已通过</span>
                                <span th:if="${record.status == 2}" class="badge bg-danger">已驳回</span>
                            </td>
                            <td>
                                <button th:if="${record.status == 0}" class="btn btn-sm btn-success" 
                                        th:onclick="'auditRecord(' + ${record.id} + ', 1)'">
                                    <i class="bi bi-check"></i> 通过
                                </button>
                                <button th:if="${record.status == 0}" class="btn btn-sm btn-danger" 
                                        th:onclick="'auditRecord(' + ${record.id} + ', 2)'">
                                    <i class="bi bi-x"></i> 驳回
                                </button>
                                <a th:if="${record.status == 1}" class="btn btn-sm btn-primary" 
                                   th:href="@{/teacher/evaluation/evaluate/{studentId}(studentId=${record.studentId})}">
                                    <i class="bi bi-star"></i> 评价
                                </a>
                                <span th:if="${record.status == 2}" class="text-muted">已驳回</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(page.records)}">
                            <td colspan="11" class="text-center text-muted py-4">暂无数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 分页 -->
            <nav th:if="${page.total > 0}">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${page.current == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/teacher/sport/audit(page=${page.current - 1})}">上一页</a>
                    </li>
                    <li class="page-item disabled">
                        <span class="page-link">第 [[${page.current}]] / [[${page.pages}]] 页</span>
                    </li>
                    <li class="page-item" th:classappend="${page.current == page.pages} ? 'disabled'">
                        <a class="page-link" th:href="@{/teacher/sport/audit(page=${page.current + 1})}">下一页</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<!-- 审核模态框 -->
<div class="modal fade" id="auditModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">审核确认</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="auditRecordId">
                <input type="hidden" id="auditStatus">
                <div class="mb-3">
                    <label class="form-label">审核备注（可选）</label>
                    <textarea class="form-control" id="auditRemark" rows="3" 
                              placeholder="填写审核意见..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="confirmAudit()">确认</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
    // 全选/取消全选
    document.getElementById('selectAll').addEventListener('change', function() {
        const checkboxes = document.querySelectorAll('.record-checkbox:not(:disabled)');
        checkboxes.forEach(cb => cb.checked = this.checked);
    });

    // 单个审核
    function auditRecord(recordId, status) {
        document.getElementById('auditRecordId').value = recordId;
        document.getElementById('auditStatus').value = status;
        
        const modal = new bootstrap.Modal(document.getElementById('auditModal'));
        modal.show();
    }

    // 确认审核
    function confirmAudit() {
        const recordId = document.getElementById('auditRecordId').value;
        const status = document.getElementById('auditStatus').value;
        const remark = document.getElementById('auditRemark').value;

        fetch('/teacher/sport/audit', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                recordId: parseInt(recordId),
                status: parseInt(status),
                remark: remark
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('审核成功！');
                window.location.reload();
            } else {
                alert('审核失败：' + data.message);
            }
        })
        .catch(error => {
            alert('请求失败：' + error.message);
        });
    }

    // 批量审核
    function batchAudit(status) {
        const checkboxes = document.querySelectorAll('.record-checkbox:checked');
        if (checkboxes.length === 0) {
            alert('请至少选择一条记录！');
            return;
        }

        if (!confirm(`确定要${status === 1 ? '通过' : '驳回'}选中的 ${checkboxes.length} 条记录吗？`)) {
            return;
        }

        const recordIds = Array.from(checkboxes).map(cb => parseInt(cb.value));

        fetch('/teacher/sport/batch-audit', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                recordIds: recordIds,
                status: status
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('批量审核成功！');
                window.location.reload();
            } else {
                alert('批量审核失败：' + data.message);
            }
        })
        .catch(error => {
            alert('请求失败：' + error.message);
        });
    }
</script>

</body>
</html>
