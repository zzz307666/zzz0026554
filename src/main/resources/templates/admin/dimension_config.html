<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评价维度配置 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .dimension-card {
            transition: all 0.3s;
            border: 2px solid #e5e7eb;
        }
        .dimension-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .weight-slider {
            width: 100%;
        }
        .weight-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4f46e5;
        }
        .total-weight-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        .preview-chart {
            max-height: 300px;
        }
    </style>
</head>
<body>

<div class="container-fluid mt-4">
    <div class="mb-4">
        <a href="/admin/index" class="btn btn-secondary">返回后台</a>
        <h3 class="d-inline ms-3">五维评价指标权重配置</h3>
    </div>

    <!-- 权重总览卡片 -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="total-weight-card">
                <h5>当前权重总和</h5>
                <h2 id="totalWeight">1.00</h2>
                <small>必须等于 1.00</small>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">权重分配预览</h5>
                    <canvas id="weightChart" class="preview-chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 维度列表 -->
    <div class="row" id="dimensionList">
        <div class="col-md-4 mb-4" th:each="dimension : ${dimensions}">
            <div class="card dimension-card h-100">
                <div class="card-header bg-light">
                    <h5 class="mb-0">
                        <span th:text="${dimension.dimensionName}">耐力</span>
                        <small class="text-muted" th:text="'(' + ${dimension.dimensionCode} + ')'">(ENDURANCE)</small>
                    </h5>
                </div>
                <div class="card-body">
                    <p class="text-muted" th:text="${dimension.description}">持续运动的能力</p>
                    
                    <div class="mb-3">
                        <label class="form-label">当前权重：<span class="weight-value" th:id="'weight_' + ${dimension.id}" th:text="${dimension.weight}">0.25</span></label>
                        <input type="range" class="form-range weight-slider" 
                               th:id="'slider_' + ${dimension.id}"
                               th:data-id="${dimension.id}"
                               min="0" 
                               max="1" 
                               step="0.05"
                               th:value="${dimension.weight}"
                               oninput="updateWeight(this)">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">满分设置</label>
                        <input type="number" class="form-control" 
                               th:id="'maxScore_' + ${dimension.id}"
                               th:value="${dimension.maxScore}"
                               min="0" 
                               max="100"
                               step="1">
                    </div>

                    <div class="d-flex justify-content-between">
                        <button class="btn btn-sm btn-outline-primary" 
                                th:onclick="'saveDimension(' + ${dimension.id} + ')'">
                            <i class="bi bi-save"></i> 保存
                        </button>
                        <span th:if="${dimension.status == 1}" class="badge bg-success">启用</span>
                        <span th:if="${dimension.status == 0}" class="badge bg-secondary">禁用</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 批量操作按钮 -->
    <div class="mt-4 text-center">
        <button class="btn btn-primary btn-lg" onclick="batchSave()">
            <i class="bi bi-save2"></i> 批量保存所有修改
        </button>
        <button class="btn btn-outline-secondary btn-lg ms-3" onclick="resetToDefault()">
            <i class="bi bi-arrow-counterclockwise"></i> 恢复默认权重
        </button>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script>
    let weightChart = null;

    // 初始化图表
    function initChart() {
        const ctx = document.getElementById('weightChart').getContext('2d');
        const labels = [];
        const data = [];
        
        document.querySelectorAll('.dimension-card').forEach(card => {
            const name = card.querySelector('.card-header h5').textContent.split('(')[0].trim();
            const slider = card.querySelector('.weight-slider');
            labels.push(name);
            data.push(parseFloat(slider.value));
        });

        weightChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.8)',
                        'rgba(54, 162, 235, 0.8)',
                        'rgba(255, 206, 86, 0.8)',
                        'rgba(75, 192, 192, 0.8)',
                        'rgba(153, 102, 255, 0.8)'
                    ]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });
    }

    // 更新权重显示
    function updateWeight(slider) {
        const id = slider.dataset.id;
        const value = parseFloat(slider.value);
        document.getElementById('weight_' + id).textContent = value.toFixed(2);
        
        calculateTotalWeight();
        updateChart();
    }

    // 计算总权重
    function calculateTotalWeight() {
        let total = 0;
        document.querySelectorAll('.weight-slider').forEach(slider => {
            total += parseFloat(slider.value);
        });
        document.getElementById('totalWeight').textContent = total.toFixed(2);
        
        // 验证
        if (total > 1.01 || total < 0.99) {
            document.getElementById('totalWeight').style.color = '#dc3545';
        } else {
            document.getElementById('totalWeight').style.color = 'white';
        }
    }

    // 更新图表
    function updateChart() {
        if (weightChart) {
            const newData = [];
            document.querySelectorAll('.weight-slider').forEach(slider => {
                newData.push(parseFloat(slider.value));
            });
            weightChart.data.datasets[0].data = newData;
            weightChart.update();
        }
    }

    // 保存单个维度
    function saveDimension(id) {
        const weight = parseFloat(document.getElementById('slider_' + id).value);
        const maxScore = parseFloat(document.getElementById('maxScore_' + id).value);

        fetch('/admin/dimension/update', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                id: id,
                weight: weight,
                maxScore: maxScore
            })
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);
            if (data.success) {
                location.reload();
            }
        })
        .catch(error => {
            alert('保存失败：' + error.message);
        });
    }

    // 批量保存
    function batchSave() {
        const dimensions = [];
        document.querySelectorAll('.dimension-card').forEach(card => {
            const slider = card.querySelector('.weight-slider');
            const maxScoreInput = card.querySelector('input[type="number"]');
            dimensions.push({
                id: parseInt(slider.dataset.id),
                weight: parseFloat(slider.value),
                maxScore: parseFloat(maxScoreInput.value)
            });
        });

        // 验证总权重
        const totalWeight = dimensions.reduce((sum, dim) => sum + dim.weight, 0);
        if (totalWeight > 1.01 || totalWeight < 0.99) {
            alert('权重总和必须为1.0（当前：' + totalWeight.toFixed(2) + '）');
            return;
        }

        fetch('/admin/dimension/batch-update', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(dimensions)
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message);
            if (data.success) {
                location.reload();
            }
        })
        .catch(error => {
            alert('批量保存失败：' + error.message);
        });
    }

    // 恢复默认权重
    function resetToDefault() {
        if (confirm('确定要恢复默认权重吗？\n\n默认配置：\n耐力: 25%\n力量: 20%\n速度: 20%\n柔韧: 15%\n协调: 20%')) {
            const defaults = [0.25, 0.20, 0.20, 0.15, 0.20];
            const sliders = document.querySelectorAll('.weight-slider');
            
            sliders.forEach((slider, index) => {
                slider.value = defaults[index];
                updateWeight(slider);
            });
        }
    }

    // 页面加载时初始化
    window.onload = function() {
        initChart();
        calculateTotalWeight();
    };
</script>

</body>
</html>
