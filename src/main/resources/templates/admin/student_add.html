<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加学生 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .form-container {
            background: linear-gradient(135deg, #f6f8ff 0%, #f0f4ff 100%);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #e5e7eb;
        }
        .form-title {
            color: #10b981;
            font-weight: 700;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #10b981;
        }
        .required::after {
            content: " *";
            color: #ef4444;
        }
        /* 搜索下拉样式 */
        .search-select {
            position: relative;
        }
        .search-select input {
            padding-right: 40px;
        }
        .search-select .dropdown-menu {
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="operation-panel">
    <h2 class="operation-title">添加学生</h2>
    <div class="mb-4">
        <a href="/admin/student/manage" class="btn btn-secondary">返回列表</a>
        <a href="/admin/index" class="btn btn-outline-secondary">返回后台</a>
    </div>

    <div class="form-container">
        <h4 class="form-title">学生信息填写</h4>

        <form id="studentForm" onsubmit="submitForm(event)">
            <div class="row">
                <div class="col-md-6">
                    <h5 class="mb-3" style="color: #10b981;">账号信息</h5>
                    <div class="mb-3">
                        <label class="form-label required">用户名</label>
                        <input type="text" class="form-control" id="username" name="username" required
                               placeholder="请输入用户名">
                    </div>
                    <div class="mb-3">
                        <label class="form-label required">真实姓名</label>
                        <input type="text" class="form-control" id="realName" name="realName" required
                               placeholder="请输入真实姓名">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        <input type="tel" class="form-control" id="phone" name="phone"
                               placeholder="请输入手机号">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="请输入邮箱">
                    </div>
                </div>

                <div class="col-md-6">
                    <h5 class="mb-3" style="color: #10b981;">学生信息</h5>
                    <!-- 核心修改：搜索式单选下拉 -->
                    <div class="mb-3">
                        <label class="form-label required">所属班级</label>
                        <div class="search-select">
                            <input type="text" class="form-control" id="classSearch"
                                   placeholder="搜索年级/班级（如：大一/计算机1班）" required>
                            <input type="hidden" id="classId" name="classId" required>
                            <!-- 下拉选项容器 -->
                            <div class="dropdown-menu" id="classDropdown" style="display: none;"></div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">性别</label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" id="gender1" value="1" checked>
                                <label class="form-check-label" for="gender1">男</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" id="gender2" value="2">
                                <label class="form-check-label" for="gender2">女</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" id="gender0" value="0">
                                <label class="form-check-label" for="gender0">未知</label>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">出生日期</label>
                        <input type="date" class="form-control" id="birthDate" name="birthDate">
                    </div>
                </div>
            </div>

            <div class="alert alert-info mt-4">
                <div class="d-flex">
                    <div class="flex-shrink-0">
                        <i class="bi bi-info-circle-fill"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <h6 class="alert-heading">提示信息</h6>
                        <ul class="mb-0">
                            <li>初始密码默认为：<strong>abc123</strong></li>
                            <li>学生账号默认状态为：<strong>正常</strong></li>
                            <li>带 <span class="text-danger">*</span> 号的为必填项</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-success px-5" id="submitBtn">
                    <span id="submitText">添加学生</span>
                    <span id="loadingSpinner" class="loading-spinner" style="display: none; margin-left: 10px;"></span>
                </button>
                <a href="/admin/student/manage" class="btn btn-secondary px-5">取消</a>
            </div>
        </form>
    </div>
</div>

<script>
    // 班级数据（格式：年级/班级|ID）
    const classList = /*[[${classList}]]*/ [];

    // 搜索班级逻辑
    const classSearch = document.getElementById('classSearch');
    const classDropdown = document.getElementById('classDropdown');
    const classId = document.getElementById('classId');

    // 输入搜索
    classSearch.addEventListener('input', function() {
        const keyword = this.value.trim().toLowerCase();
        if (!keyword) {
            classDropdown.style.display = 'none';
            return;
        }

        // 筛选匹配的班级（支持年级/班级模糊搜索）
        const matchedClasses = classList.filter(cls =>
            cls.toLowerCase().includes(keyword)
        );

        // 渲染下拉选项
        classDropdown.innerHTML = matchedClasses.map(cls => {
            const [name, id] = cls.split('|');
            return `<a class="dropdown-item" href="javascript:;" data-id="${id}" data-name="${name}">${name}</a>`;
        }).join('');

        classDropdown.style.display = matchedClasses.length > 0 ? 'block' : 'none';
    });

    // 选择班级
    classDropdown.addEventListener('click', function(e) {
        if (e.target.tagName === 'A') {
            const selectedName = e.target.getAttribute('data-name');
            const selectedId = e.target.getAttribute('data-id');
            classSearch.value = selectedName;
            classId.value = selectedId;
            classDropdown.style.display = 'none';
        }
    });

    // 点击其他区域关闭下拉
    document.addEventListener('click', function(e) {
        if (!classSearch.contains(e.target) && !classDropdown.contains(e.target)) {
            classDropdown.style.display = 'none';
        }
    });

    // 表单提交
    function submitForm(event) {
        event.preventDefault();

        // 校验班级是否选择
        if (!classId.value) {
            alert('请选择所属班级！');
            return;
        }

        const formData = {
            user: {
                username: document.getElementById('username').value,
                realName: document.getElementById('realName').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value
            },
            student: {
                classId: classId.value,
                gender: document.querySelector('input[name="gender"]:checked').value,
                birthDate: document.getElementById('birthDate').value
            }
        };

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        document.getElementById('submitText').textContent = '添加中...';
        document.getElementById('loadingSpinner').style.display = 'inline-block';

        fetch('/admin/student/add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(formData)
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('添加成功！');
                    window.location.href = '/admin/student/manage';
                } else {
                    alert('添加失败：' + data.message);
                }
            })
            .catch(error => alert('请求失败：' + error.message))
            .finally(() => {
                submitBtn.disabled = false;
                document.getElementById('submitText').textContent = '添加学生';
                document.getElementById('loadingSpinner').style.display = 'none';
            });
    }

    // 初始化出生日期（默认18年前）
    const today = new Date();
    const defaultDate = new Date(today.getFullYear() - 18, today.getMonth(), today.getDate());
    document.getElementById('birthDate').value = defaultDate.toISOString().split('T')[0];
</script>
</body>
</html>
