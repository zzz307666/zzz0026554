<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告管理 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <!-- Quill 富文本编辑器 -->
    <link href="https://cdn.bootcdn.net/ajax/libs/quill/1.3.7/quill.snow.min.css" rel="stylesheet">
    <style>
        .announcement-card {
            transition: all 0.3s;
            border-left: 4px solid #4f46e5;
        }
        .announcement-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        #editor-container {
            height: 300px;
        }
        .ql-editor {
            min-height: 300px;
        }
    </style>
</head>
<body>

<div class="container-fluid mt-4">
    <!-- 页面标题 -->
    <div class="mb-4 d-flex justify-content-between align-items-center">
        <div>
            <a href="/admin/index" class="btn btn-secondary">返回后台</a>
            <h3 class="d-inline ms-3">📢 系统公告管理</h3>
        </div>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addModal" onclick="resetForm()">
            <i class="bi bi-plus-circle"></i> 发布公告
        </button>
    </div>

    <!-- 统计卡片 -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card bg-primary text-white">
                <div class="card-body">
                    <h6 class="card-title">全部公告</h6>
                    <h3 class="mb-0" th:text="${page.total}">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h6 class="card-title">已发布</h6>
                    <h3 class="mb-0" id="publishedCount">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-warning text-white">
                <div class="card-body">
                    <h6 class="card-title">草稿</h6>
                    <h3 class="mb-0" id="draftCount">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-secondary text-white">
                <div class="card-body">
                    <h6 class="card-title">已下架</h6>
                    <h3 class="mb-0" id="offlineCount">0</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选条件 -->
    <div class="card mb-4">
        <div class="card-body">
            <form class="row g-3" method="get" action="/admin/announcement/list">
                <div class="col-md-4">
                    <select class="form-select" name="type">
                        <option value="">全部类型</option>
                        <option value="INFO" th:selected="${param.type != null and param.type[0] == 'INFO'}">通知</option>
                        <option value="IMPORTANT" th:selected="${param.type != null and param.type[0] == 'IMPORTANT'}">重要</option>
                        <option value="URGENT" th:selected="${param.type != null and param.type[0] == 'URGENT'}">紧急</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <select class="form-select" name="status">
                        <option value="">全部状态</option>
                        <option value="0" th:selected="${param.status != null and param.status[0] == '0'}">草稿</option>
                        <option value="1" th:selected="${param.status != null and param.status[0] == '1'}">已发布</option>
                        <option value="2" th:selected="${param.status != null and param.status[0] == '2'}">已下架</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <div class="d-grid gap-2 d-md-flex">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="bi bi-search"></i> 查询
                        </button>
                        <a href="/admin/announcement/list" class="btn btn-secondary">重置</a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- 公告列表 -->
    <div class="row" id="announcementList">
        <div class="col-md-6 col-lg-4 mb-4" th:each="announcement : ${page.records}">
            <div class="card announcement-card h-100">
                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 text-truncate" style="max-width: 70%;" th:text="${announcement.title}" title="公告标题">标题</h5>
                    <div>
                        <span th:if="${announcement.type == 'INFO'}" class="badge bg-info">通知</span>
                        <span th:if="${announcement.type == 'IMPORTANT'}" class="badge bg-warning">重要</span>
                        <span th:if="${announcement.type == 'URGENT'}" class="badge bg-danger">紧急</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="mb-2">
                        <small class="text-muted">
                            <i class="bi bi-eye"></i> <span th:text="${announcement.viewCount}">0</span> 次浏览
                        </small>
                    </div>
                    
                    <div class="mb-3">
                        <small class="text-muted">
                            <i class="bi bi-calendar"></i> 
                            <span th:text="${#temporals.format(announcement.createTime, 'yyyy-MM-dd')}">2026-05-24</span>
                        </small>
                    </div>

                    <div class="mb-3">
                        <span th:if="${announcement.status == 0}" class="badge bg-secondary">草稿</span>
                        <span th:if="${announcement.status == 1}" class="badge bg-success">已发布</span>
                        <span th:if="${announcement.status == 2}" class="badge bg-dark">已下架</span>
                        
                        <span th:if="${announcement.priority > 0}" class="badge bg-primary ms-1">
                            优先级 <span th:text="${announcement.priority}">1</span>
                        </span>
                    </div>

                    <div th:if="${announcement.startTime != null or announcement.endTime != null}" class="mb-3">
                        <small class="text-muted">
                            <i class="bi bi-clock"></i>
                            <span th:if="${announcement.startTime != null}" th:text="'生效: ' + ${#temporals.format(announcement.startTime, 'MM-dd')}"></span>
                            <span th:if="${announcement.endTime != null}" th:text="' 至 ' + ${#temporals.format(announcement.endTime, 'MM-dd')}"></span>
                        </small>
                    </div>
                </div>
                <div class="card-footer bg-light">
                    <div class="btn-group w-100">
                        <button class="btn btn-sm btn-outline-primary" th:onclick="'viewDetail(' + ${announcement.id} + ')'">
                            <i class="bi bi-eye"></i> 查看
                        </button>
                        <button class="btn btn-sm btn-outline-warning" th:onclick="'editAnnouncement(' + ${announcement.id} + ')'">
                            <i class="bi bi-pencil"></i> 编辑
                        </button>
                        <button th:if="${announcement.status == 1}" class="btn btn-sm btn-outline-secondary" 
                                th:onclick="'offlineAnnouncement(' + ${announcement.id} + ')'">
                            <i class="bi bi-arrow-down"></i> 下架
                        </button>
                        <button class="btn btn-sm btn-outline-danger" th:onclick="'deleteAnnouncement(' + ${announcement.id} + ')'">
                            <i class="bi bi-trash"></i> 删除
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-12" th:if="${#lists.isEmpty(page.records)}">
            <div class="text-center py-5 text-muted">
                <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                <p class="mt-3">暂无公告，请点击右上角发布</p>
            </div>
        </div>
    </div>

    <!-- 分页 -->
    <div class="d-flex justify-content-center mt-4" th:if="${!#lists.isEmpty(page.records)}">
        <nav aria-label="Page navigation">
            <ul class="pagination">
                <li class="page-item" th:classappend="${page.current == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/announcement/list(page=${page.current - 1}, size=${page.size}, type=${param.type}, status=${param.status})}">上一页</a>
                </li>
                <li class="page-item disabled">
                    <span class="page-link">第 [[${page.current}]] / [[${page.pages}]] 页</span>
                </li>
                <li class="page-item" th:classappend="${page.current == page.pages} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/announcement/list(page=${page.current + 1}, size=${page.size}, type=${param.type}, status=${param.status})}">下一页</a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<!-- 添加/编辑模态框 -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">发布公告</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="announcementForm">
                    <input type="hidden" name="id" id="announcementId">
                    
                    <div class="mb-3">
                        <label class="form-label">公告标题 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="title" id="title" required maxlength="200">
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">公告类型</label>
                            <select class="form-select" name="type" id="type">
                                <option value="INFO">通知</option>
                                <option value="IMPORTANT">重要</option>
                                <option value="URGENT">紧急</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">优先级</label>
                            <input type="number" class="form-control" name="priority" id="priority" value="0" min="0" max="100">
                            <small class="text-muted">数字越大越优先显示</small>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">生效开始时间</label>
                            <input type="datetime-local" class="form-control" name="startTime" id="startTime">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">生效结束时间</label>
                            <input type="datetime-local" class="form-control" name="endTime" id="endTime">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">公告内容 <span class="text-danger">*</span></label>
                        <div id="editor-container"></div>
                        <textarea name="content" id="content" style="display:none;" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-success" onclick="saveAsDraft()">保存草稿</button>
                <button type="button" class="btn btn-primary" onclick="publishAnnouncement()">发布公告</button>
            </div>
        </div>
    </div>
</div>

<!-- 详情模态框 -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="detailTitle">公告详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="detailContent"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<!-- Quill 富文本编辑器 -->
<script src="https://cdn.bootcdn.net/ajax/libs/quill/1.3.7/quill.min.js"></script>
<script>
    // 初始化 Quill 编辑器
    var quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: '请输入公告内容...',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                [{ 'align': [] }],
                ['link', 'image'],
                ['clean']
            ]
        }
    });

    let isEditMode = false;

    // 重置表单
    function resetForm() {
        isEditMode = false;
        document.getElementById('modalTitle').textContent = '发布公告';
        document.getElementById('announcementForm').reset();
        document.getElementById('announcementId').value = '';
        quill.setContents([]);
    }

    // 保存为草稿
    function saveAsDraft() {
        submitForm(0); // status = 0 表示草稿
    }

    // 发布公告
    function publishAnnouncement() {
        if (!validateForm()) {
            return;
        }
        submitForm(1); // status = 1 表示已发布
    }

    // 提交表单
    function submitForm(status) {
        const title = document.getElementById('title').value.trim();
        const content = quill.root.innerHTML;
        
        if (!title) {
            alert('请输入公告标题');
            return;
        }
        
        if (!content || content === '<p><br></p>') {
            alert('请输入公告内容');
            return;
        }

        // 将富文本内容设置到隐藏字段
        document.getElementById('content').value = content;

        const formData = {
            id: document.getElementById('announcementId').value || null,
            title: title,
            type: document.getElementById('type').value,
            priority: parseInt(document.getElementById('priority').value) || 0,
            startTime: document.getElementById('startTime').value || null,
            endTime: document.getElementById('endTime').value || null,
            content: content,
            status: status
        };

        const url = isEditMode ? '/admin/announcement/update' : '/admin/announcement/publish';
        
        fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(result => {
            alert(result.message);
            if (result.success) {
                location.reload();
            }
        })
        .catch(error => {
            alert('操作失败: ' + error.message);
        });
    }

    // 验证表单
    function validateForm() {
        const title = document.getElementById('title').value.trim();
        const content = quill.root.innerHTML;
        
        if (!title) {
            alert('请输入公告标题');
            return false;
        }
        
        if (!content || content === '<p><br></p>') {
            alert('请输入公告内容');
            return false;
        }
        
        return true;
    }

    // 编辑公告
    function editAnnouncement(id) {
        fetch('/admin/announcement/detail/' + id)
            .then(response => response.json())
            .then(data => {
                isEditMode = true;
                document.getElementById('modalTitle').textContent = '编辑公告';
                document.getElementById('announcementId').value = data.id;
                document.getElementById('title').value = data.title;
                document.getElementById('type').value = data.type;
                document.getElementById('priority').value = data.priority || 0;
                
                if (data.startTime) {
                    document.getElementById('startTime').value = data.startTime.replace(' ', 'T');
                }
                if (data.endTime) {
                    document.getElementById('endTime').value = data.endTime.replace(' ', 'T');
                }
                
                // 设置富文本内容
                quill.root.innerHTML = data.content;
                
                new bootstrap.Modal(document.getElementById('addModal')).show();
            })
            .catch(error => alert('获取公告详情失败: ' + error.message));
    }

    // 查看详情
    function viewDetail(id) {
        fetch('/admin/announcement/detail/' + id)
            .then(response => response.json())
            .then(data => {
                document.getElementById('detailTitle').textContent = data.title;
                document.getElementById('detailContent').innerHTML = data.content;
                new bootstrap.Modal(document.getElementById('detailModal')).show();
            })
            .catch(error => alert('获取公告详情失败: ' + error.message));
    }

    // 下架公告
    function offlineAnnouncement(id) {
        if (!confirm('确定要下架此公告吗？')) {
            return;
        }
        
        fetch('/admin/announcement/offline/' + id, {
            method: 'POST'
        })
        .then(response => response.json())
        .then(result => {
            alert(result.message);
            if (result.success) {
                location.reload();
            }
        })
        .catch(error => alert('下架失败: ' + error.message));
    }

    // 删除公告
    function deleteAnnouncement(id) {
        if (!confirm('确定要删除此公告吗？此操作不可恢复！')) {
            return;
        }
        
        fetch('/admin/announcement/delete/' + id, {
            method: 'POST'
        })
        .then(response => response.json())
        .then(result => {
            alert(result.message);
            if (result.success) {
                location.reload();
            }
        })
        .catch(error => alert('删除失败: ' + error.message));
    }

    // 加载统计数据
    function loadStats() {
        const rows = document.querySelectorAll('#announcementList .col-md-6');
        let published = 0, draft = 0, offline = 0;
        
        rows.forEach(row => {
            const badge = row.querySelector('.badge.bg-success, .badge.bg-secondary, .badge.bg-dark');
            if (badge) {
                if (badge.textContent.includes('已发布')) published++;
                else if (badge.textContent.includes('草稿')) draft++;
                else if (badge.textContent.includes('已下架')) offline++;
            }
        });
        
        document.getElementById('publishedCount').textContent = published;
        document.getElementById('draftCount').textContent = draft;
        document.getElementById('offlineCount').textContent = offline;
    }

    // 页面加载时执行
    $(document).ready(function() {
        loadStats();
    });
</script>

</body>
</html>
