<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>所有学生 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css?v=1.0}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="operation-panel">
    <h2 class="operation-title">所有学生管理（含禁用）</h2>
    <div class="mb-4">
        <a href="/admin/index" class="btn btn-secondary">返回后台</a>
        <a href="/admin/user/manage" class="btn btn-primary">用户管理</a>
        <a href="/admin/teacher/manage" class="btn btn-primary">教师管理</a>
        <a href="/admin/student/manage" class="btn btn-primary">学生管理</a>
        <a href="/admin/student/all" class="btn btn-nav-active">所有学生</a>
        <a href="/admin/class/manage" class="btn btn-primary">班级管理</a>
        <a href="/admin/student/add" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> 添加学生
        </a>
    </div>

    <!-- 搜索条件 -->
    <div class="card mb-4">
        <div class="card-body">
            <form method="get" action="/admin/student/all" class="row g-3">
                <div class="col-md-3">
                    <input type="text" class="form-control" name="realName" placeholder="学生姓名" th:value="${realName}">
                </div>
                <div class="col-md-3">
                    <input type="text" class="form-control" name="studentNo" placeholder="学号" th:value="${studentNo}">
                </div>
                <div class="col-md-3">
                    <input type="text" class="form-control" name="className" placeholder="班级名称" th:value="${className}">
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> 搜索
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 学生列表 -->
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>#</th>
                <th>头像</th>
                <th>姓名</th>
                <th>学号</th>
                <th>性别</th>
                <th>班级</th>
                <th>年级</th>
                <th>手机号</th>
                <th>状态</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="10" class="text-center py-5 empty-state">
                    <i class="bi bi-inbox" style="font-size: 48px;"></i>
                    <p class="mt-3">暂无学生数据</p>
                </td>
            </tr>
            <tr th:each="student, stat : ${students}" th:unless="${#lists.isEmpty(students)}">
                <td th:text="${stat.count}">1</td>
                <td>
                    <div class="avatar" th:text="${#strings.substring(student.realName, 0, 1)}">张</div>
                </td>
                <td th:text="${student.realName}">-</td>
                <td th:text="${student.studentNo}">S2026001</td>
                <td>
                    <span th:if="${student.gender == 1}" class="badge bg-primary">男</span>
                    <span th:if="${student.gender == 0}" class="badge bg-danger">女</span>
                </td>
                <td th:text="${student.className ?: '-'}">计算机1班</td>
                <td th:text="${student.grade ?: '-'}">2022级</td>
                <td th:text="${student.phone ?: '-'}">138****1234</td>
                <td>
                    <span th:if="${student.status == 1}" class="badge bg-success">正常</span>
                    <span th:if="${student.status == 0}" class="badge bg-secondary">禁用</span>
                </td>
                <td>
                    <div class="action-buttons">
                        <a th:href="@{'/admin/student/edit/' + ${student.userId}}" class="btn btn-sm btn-primary">
                            <i class="bi bi-pencil"></i> 编辑
                        </a>
                        <button class="btn btn-sm btn-warning" 
                                th:onclick="'resetPassword(' + ${student.userId} + ')'">
                            <i class="bi bi-key"></i> 重置密码
                        </button>
                        <button class="btn btn-sm btn-danger" 
                                th:onclick="'deleteStudent(' + ${student.userId} + ')'">
                            <i class="bi bi-trash"></i> 删除
                        </button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-3">
        <span class="text-muted">共找到 <strong th:text="${#lists.size(students)}">0</strong> 名学生</span>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
    // 重置密码
    function resetPassword(userId) {
        if (confirm('确定要重置该学生的密码吗？重置后密码为：abc123')) {
            fetch(`/admin/user/reset-password/${userId}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    window.location.reload();
                }
            })
            .catch(error => {
                alert('操作失败：' + error.message);
            });
        }
    }

    // 删除学生
    function deleteStudent(userId) {
        if (confirm('确定要删除该学生吗？此操作不可恢复！')) {
            fetch(`/admin/student/delete/${userId}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    window.location.reload();
                }
            })
            .catch(error => {
                alert('删除失败：' + error.message);
            });
        }
    }
</script>

</body>
</html>
