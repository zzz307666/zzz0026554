<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统监控面板 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .monitor-card {
            transition: all 0.3s;
        }
        .monitor-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-online { background-color: #28a745; }
        .status-warning { background-color: #ffc107; }
        .status-error { background-color: #dc3545; }
    </style>
</head>
<body>

<div class="container-fluid mt-4">
    <!-- 页面标题 -->
    <div class="mb-4 d-flex justify-content-between align-items-center">
        <div>
            <a href="/admin/index" class="btn btn-secondary">返回后台</a>
            <h3 class="d-inline ms-3">🖥️ 系统监控面板</h3>
        </div>
        <button class="btn btn-outline-primary" onclick="refreshAll()">
            <i class="bi bi-arrow-clockwise"></i> 刷新数据
        </button>
    </div>

    <!-- 系统资源卡片 -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card monitor-card bg-primary text-white">
                <div class="card-body">
                    <h6 class="card-title"><i class="bi bi-cpu"></i> CPU使用率</h6>
                    <h2 class="mb-0" id="cpuLoad">--</h2>
                    <small>处理器核心：<span id="processors">--</span></small>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card monitor-card bg-success text-white">
                <div class="card-body">
                    <h6 class="card-title"><i class="bi bi-memory"></i> 内存使用</h6>
                    <h2 class="mb-0" id="memoryUsage">--</h2>
                    <small>已用：<span id="usedMemory">--</span> / <span id="totalMemory">--</span></small>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card monitor-card bg-warning text-dark">
                <div class="card-body">
                    <h6 class="card-title"><i class="bi bi-database"></i> 数据库连接</h6>
                    <h2 class="mb-0" id="dbConnections">--</h2>
                    <small>活跃：<span id="activeConnections">--</span> / 空闲：<span id="idleConnections">--</span></small>
                </div>
            </div>
        </div>
    </div>

    <!-- JVM和性能信息 -->
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-gear"></i> JVM信息</h5>
                </div>
                <div class="card-body">
                    <table class="table table-sm">
                        <tbody>
                            <tr>
                                <td>Java版本</td>
                                <td id="javaVersion">--</td>
                            </tr>
                            <tr>
                                <td>JVM名称</td>
                                <td id="jvmName">--</td>
                            </tr>
                            <tr>
                                <td>堆内存使用</td>
                                <td><span id="heapUsed">--</span> / <span id="heapMax">--</span> (<span id="heapUsage">--</span>)</td>
                            </tr>
                            <tr>
                                <td>非堆内存</td>
                                <td><span id="nonHeapUsed">--</span> / <span id="nonHeapMax">--</span></td>
                            </tr>
                            <tr>
                                <td>运行时间</td>
                                <td id="uptime">--</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-speedometer2"></i> API性能</h5>
                </div>
                <div class="card-body">
                    <table class="table table-sm">
                        <tbody>
                            <tr>
                                <td>平均响应时间</td>
                                <td id="avgResponseTime">--</td>
                            </tr>
                            <tr>
                                <td>P95响应时间</td>
                                <td id="p95ResponseTime">--</td>
                            </tr>
                            <tr>
                                <td>P99响应时间</td>
                                <td id="p99ResponseTime">--</td>
                            </tr>
                            <tr>
                                <td>总请求数</td>
                                <td id="totalRequests">--</td>
                            </tr>
                            <tr>
                                <td>QPS</td>
                                <td id="qps">--</td>
                            </tr>
                            <tr>
                                <td>错误率</td>
                                <td id="errorRate">--</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 错误日志统计 -->
    <div class="row mb-4">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> 错误日志统计</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-2 text-center">
                            <h3 class="text-danger" id="todayErrors">--</h3>
                            <small class="text-muted">今日错误</small>
                        </div>
                        <div class="col-md-2 text-center">
                            <h3 class="text-warning" id="yesterdayErrors">--</h3>
                            <small class="text-muted">昨日错误</small>
                        </div>
                        <div class="col-md-2 text-center">
                            <h3 class="text-info" id="weekErrors">--</h3>
                            <small class="text-muted">本周错误</small>
                        </div>
                        <div class="col-md-2 text-center">
                            <h3 class="text-primary" id="monthErrors">--</h3>
                            <small class="text-muted">本月错误</small>
                        </div>
                        <div class="col-md-2 text-center">
                            <h3 class="text-danger" id="criticalErrors">--</h3>
                            <small class="text-muted">严重错误</small>
                        </div>
                        <div class="col-md-2 text-center">
                            <h6 class="text-muted">最后错误</h6>
                            <small id="lastErrorTime">--</small>
                        </div>
                    </div>
                    <div class="mt-3 alert alert-warning" id="lastErrorMessage" style="display: none;">
                        <strong>最后错误信息：</strong> <span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 在线用户详情 - 已隐藏 -->
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
    $(document).ready(function() {
        loadAllData();
        
        // 每30秒自动刷新
        setInterval(loadAllData, 30000);
    });

    // 加载所有数据
    function loadAllData() {
        loadSystemResources();
        loadJvmInfo();
        loadDatabasePool();
        loadErrorStats();
        loadApiPerformance();
    }

    // 刷新所有数据
    function refreshAll() {
        loadAllData();
        alert('数据已刷新');
    }

    // 加载系统资源
    function loadSystemResources() {
        $.get('/admin/monitor/system-resources', function(result) {
            if (result.success) {
                const data = result.data;
                $('#cpuLoad').text(data.cpuLoad);
                $('#processors').text(data.processors);
                $('#memoryUsage').text(data.memoryUsage);
                $('#usedMemory').text(data.usedMemory);
                $('#totalMemory').text(data.totalMemory);
            }
        });
    }

    // 加载JVM信息
    function loadJvmInfo() {
        $.get('/admin/monitor/jvm-info', function(result) {
            if (result.success) {
                const data = result.data;
                $('#javaVersion').text(data.javaVersion);
                $('#jvmName').text(data.jvmName);
                $('#heapUsed').text(data.heapUsed);
                $('#heapMax').text(data.heapMax);
                $('#heapUsage').text(data.heapUsage);
                $('#nonHeapUsed').text(data.nonHeapUsed);
                $('#nonHeapMax').text(data.nonHeapMax);
                $('#uptime').text(data.uptime);
            }
        });
    }

    // 加载数据库连接池
    function loadDatabasePool() {
        $.get('/admin/monitor/db-pool', function(result) {
            if (result.success) {
                const data = result.data;
                $('#dbConnections').text(data.totalConnections);
                $('#activeConnections').text(data.activeConnections);
                $('#idleConnections').text(data.idleConnections);
            }
        });
    }

    // 加载错误日志统计
    function loadErrorStats() {
        $.get('/admin/monitor/error-stats', function(result) {
            if (result.success) {
                const data = result.data;
                $('#todayErrors').text(data.todayErrors);
                $('#yesterdayErrors').text(data.yesterdayErrors);
                $('#weekErrors').text(data.weekErrors);
                $('#monthErrors').text(data.monthErrors);
                $('#criticalErrors').text(data.criticalErrors);
                $('#lastErrorTime').text(data.lastErrorTime);
                
                if (data.lastErrorMessage) {
                    $('#lastErrorMessage').show().find('span').text(data.lastErrorMessage);
                }
            }
        });
    }

    // 加载API性能
    function loadApiPerformance() {
        $.get('/admin/monitor/api-performance', function(result) {
            if (result.success) {
                const data = result.data;
                $('#avgResponseTime').text(data.avgResponseTime);
                $('#p95ResponseTime').text(data.p95ResponseTime);
                $('#p99ResponseTime').text(data.p99ResponseTime);
                $('#totalRequests').text(data.totalRequests);
                $('#qps').text(data.requestsPerSecond);
                $('#errorRate').text(data.errorRate);
            }
        });
    }
</script>

</body>
</html>
