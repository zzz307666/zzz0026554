<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加奖品 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container mt-4">
    <div class="mb-4">
        <a href="/admin/exchange/gifts" class="btn btn-secondary">返回奖品列表</a>
        <h3 class="d-inline ms-3">➕ 添加奖品</h3>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-gift"></i> 奖品信息</h5>
                </div>
                <div class="card-body">
                    <form id="giftForm">
                        <div class="mb-3">
                            <label class="form-label">奖品名称 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="giftName" required 
                                   placeholder="例如：运动水杯">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">所需积分 <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="pointsCost" required 
                                       min="1" value="50" placeholder="50">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">库存数量 <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="stock" required 
                                       min="0" value="100" placeholder="100">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">分类 <span class="text-danger">*</span></label>
                                <select class="form-select" id="category" required>
                                    <option value="生活用品">生活用品</option>
                                    <option value="运动装备">运动装备</option>
                                    <option value="学习用品">学习用品</option>
                                    <option value="娱乐票务">娱乐票务</option>
                                    <option value="电子产品">电子产品</option>
                                    <option value="健身服务">健身服务</option>
                                    <option value="服装">服装</option>
                                    <option value="收藏品">收藏品</option>
                                    <option value="其他">其他</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">排序</label>
                                <input type="number" class="form-control" id="sortOrder" 
                                       min="0" value="1" placeholder="数字越小越靠前">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">奖品描述</label>
                            <textarea class="form-control" id="description" rows="3" 
                                      placeholder="详细描述奖品的特点和规格..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">奖品图片URL</label>
                            <input type="url" class="form-control" id="giftImage" 
                                   placeholder="https://example.com/image.jpg">
                            <small class="text-muted">可选，留空则显示默认图标</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">状态</label>
                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="status" 
                                           id="status1" value="1" checked>
                                    <label class="form-check-label" for="status1">上架</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="status" 
                                           id="status0" value="0">
                                    <label class="form-check-label" for="status0">下架</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/admin/exchange/gifts" class="btn btn-secondary">取消</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> 保存
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header bg-light">
                    <h6 class="mb-0"><i class="bi bi-info-circle"></i> 填写提示</h6>
                </div>
                <div class="card-body">
                    <ul class="mb-0 small">
                        <li><strong>奖品名称</strong>：简洁明了，易于理解</li>
                        <li><strong>所需积分</strong>：根据奖品价值合理设置</li>
                        <li><strong>库存数量</strong>：实际可兑换的数量</li>
                        <li><strong>分类</strong>：方便学生筛选浏览</li>
                        <li><strong>排序</strong>：数字越小越靠前显示</li>
                        <li><strong>状态</strong>：下架后学生端不可见</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('giftForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const giftData = {
        giftName: document.getElementById('giftName').value,
        pointsCost: parseInt(document.getElementById('pointsCost').value),
        stock: parseInt(document.getElementById('stock').value),
        category: document.getElementById('category').value,
        sortOrder: parseInt(document.getElementById('sortOrder').value),
        description: document.getElementById('description').value,
        giftImage: document.getElementById('giftImage').value,
        status: parseInt(document.querySelector('input[name="status"]:checked').value)
    };
    
    fetch('/admin/exchange/gift/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(giftData)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('添加成功！');
            window.location.href = '/admin/exchange/gifts';
        } else {
            alert('添加失败：' + data.message);
        }
    })
    .catch(error => {
        alert('网络错误，请稍后重试');
        console.error('添加异常:', error);
    });
});
</script>
</body>
</html>
