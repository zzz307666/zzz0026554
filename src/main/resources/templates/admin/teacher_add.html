<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加教师 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .form-container {
            background: linear-gradient(135deg, #f6f8ff 0%, #f0f4ff 100%);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #e5e7eb;
        }
        .form-title {
            color: #10b981;
            font-weight: 700;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #10b981;
        }
        .required::after {
            content: " *";
            color: #ef4444;
        }
        /* 搜索下拉样式（多选） */
        .search-multi-select {
            position: relative;
        }
        .search-multi-select input {
            padding-right: 40px;
        }
        .search-multi-select .dropdown-menu {
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            margin-top: 5px;
        }
        /* 已选标签样式 */
        .selected-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .tag-item {
            background: #0d6efd;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .tag-close {
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="operation-panel">
    <h2 class="operation-title">添加教师</h2>
    <div class="mb-4">
        <a href="/admin/teacher/manage" class="btn btn-secondary">返回列表</a>
        <a href="/admin/index" class="btn btn-outline-secondary">返回后台</a>
    </div>

    <div class="form-container">
        <h4 class="form-title">教师信息填写</h4>

        <form id="teacherForm" onsubmit="submitForm(event)">
            <div class="row">
                <div class="col-md-6">
                    <h5 class="mb-3" style="color: #10b981;">账号信息</h5>
                    <div class="mb-3">
                        <label class="form-label required">用户名</label>
                        <input type="text" class="form-control" id="username" name="username" required
                               placeholder="请输入用户名">
                    </div>
                    <div class="mb-3">
                        <label class="form-label required">真实姓名</label>
                        <input type="text" class="form-control" id="realName" name="realName" required
                               placeholder="请输入真实姓名">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        <input type="tel" class="form-control" id="phone" name="phone"
                               placeholder="请输入手机号">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="请输入邮箱">
                    </div>
                </div>

                <div class="col-md-6">
                    <h5 class="mb-3" style="color: #10b981;">教师信息</h5>
                    <!-- 核心：搜索式多选下拉 -->
                    <div class="mb-3">
                        <label class="form-label required">任教班级（可多选）</label>
                        <div class="search-multi-select">
                            <input type="text" class="form-control" id="classSearch"
                                   placeholder="搜索年级/班级（如：大一/计算机1班）">
                            <!-- 下拉选项容器 -->
                            <div class="dropdown-menu" id="classDropdown" style="display: none;"></div>
                            <!-- 已选班级标签容器 -->
                            <div class="selected-tags" id="selectedClasses"></div>
                            <!-- 隐藏字段：存储已选班级ID（逗号分隔） -->
                            <input type="hidden" id="classIds" name="classIds" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label required">任教科目</label>
                        <input type="text" class="form-control" id="subject" name="subject" required
                               placeholder="请输入任教科目（如：体育/数学）">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">性别</label>
                        <div class="d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" id="gender1" value="1" checked>
                                <label class="form-check-label" for="gender1">男</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" id="gender2" value="2">
                                <label class="form-check-label" for="gender2">女</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gender" id="gender0" value="0">
                                <label class="form-check-label" for="gender0">未知</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="alert alert-info mt-4">
                <div class="d-flex">
                    <div class="flex-shrink-0">
                        <i class="bi bi-info-circle-fill"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <h6 class="alert-heading">提示信息</h6>
                        <ul class="mb-0">
                            <li>初始密码默认为：<strong>abc123</strong></li>
                            <li>教师账号默认状态为：<strong>正常</strong></li>
                            <li>带 <span class="text-danger">*</span> 号的为必填项</li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-success px-5" id="submitBtn">
                    <span id="submitText">添加教师</span>
                    <span id="loadingSpinner" class="loading-spinner" style="display: none; margin-left: 10px;"></span>
                </button>
                <a href="/admin/teacher/manage" class="btn btn-secondary px-5">取消</a>
            </div>
        </form>
    </div>
</div>

<script>
    // 班级数据（格式：年级/班级|ID）
    const classList = /*[[${classList}]]*/ [];
    // 已选班级Map（key: classId, value: className）
    const selectedClassMap = new Map();

    // 搜索班级逻辑
    const classSearch = document.getElementById('classSearch');
    const classDropdown = document.getElementById('classDropdown');
    const selectedClasses = document.getElementById('selectedClasses');
    const classIdsInput = document.getElementById('classIds');

    // 输入搜索
    classSearch.addEventListener('input', function() {
        const keyword = this.value.trim().toLowerCase();
        if (!keyword) {
            classDropdown.style.display = 'none';
            return;
        }

        // 筛选匹配的班级（排除已选的）
        const matchedClasses = classList.filter(cls => {
            const [name, id] = cls.split('|');
            return cls.toLowerCase().includes(keyword) && !selectedClassMap.has(id);
        });

        // 渲染下拉选项
        classDropdown.innerHTML = matchedClasses.map(cls => {
            const [name, id] = cls.split('|');
            return `<a class="dropdown-item" href="javascript:;" data-id="${id}" data-name="${name}">${name}</a>`;
        }).join('');

        classDropdown.style.display = matchedClasses.length > 0 ? 'block' : 'none';
    });

    // 选择班级（多选）
    classDropdown.addEventListener('click', function(e) {
        if (e.target.tagName === 'A') {
            const selectedName = e.target.getAttribute('data-name');
            const selectedId = e.target.getAttribute('data-id');

            // 添加到已选Map
            selectedClassMap.set(selectedId, selectedName);
            // 更新隐藏字段
            updateSelectedClassIds();
            // 渲染已选标签
            renderSelectedTags();

            // 清空搜索框，关闭下拉
            classSearch.value = '';
            classDropdown.style.display = 'none';
        }
    });

    // 点击其他区域关闭下拉
    document.addEventListener('click', function(e) {
        if (!classSearch.contains(e.target) && !classDropdown.contains(e.target)) {
            classDropdown.style.display = 'none';
        }
    });

    // 渲染已选标签
    function renderSelectedTags() {
        selectedClasses.innerHTML = '';
        selectedClassMap.forEach((name, id) => {
            const tag = document.createElement('div');
            tag.className = 'tag-item';
            tag.innerHTML = `
                <span>${name}</span>
                <span class="tag-close" data-id="${id}">&times;</span>
            `;
            // 标签关闭事件
            tag.querySelector('.tag-close').addEventListener('click', function() {
                const removeId = this.getAttribute('data-id');
                selectedClassMap.delete(removeId);
                updateSelectedClassIds();
                renderSelectedTags();
            });
            selectedClasses.appendChild(tag);
        });
    }

    // 更新已选班级ID到隐藏字段
    function updateSelectedClassIds() {
        const classIds = Array.from(selectedClassMap.keys()).join(',');
        classIdsInput.value = classIds;
    }

    // 表单提交
    function submitForm(event) {
        event.preventDefault();

        // 校验班级是否选择
        if (selectedClassMap.size === 0) {
            alert('请至少选择一个任教班级！');
            return;
        }

        const formData = {
            user: {
                username: document.getElementById('username').value,
                realName: document.getElementById('realName').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value
            },
            teacher: {
                subject: document.getElementById('subject').value,
                gender: document.querySelector('input[name="gender"]:checked').value,
                classIds: Array.from(selectedClassMap.keys()) // 传递数组
            }
        };

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        document.getElementById('submitText').textContent = '添加中...';
        document.getElementById('loadingSpinner').style.display = 'inline-block';

        fetch('/admin/teacher/add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(formData)
        })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('添加成功！');
                    window.location.href = '/admin/teacher/manage';
                } else {
                    alert('添加失败：' + data.message);
                }
            })
            .catch(error => alert('请求失败：' + error.message))
            .finally(() => {
                submitBtn.disabled = false;
                document.getElementById('submitText').textContent = '添加教师';
                document.getElementById('loadingSpinner').style.display = 'none';
            });
    }
</script>
</body>
</html>
