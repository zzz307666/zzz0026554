<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级管理 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css?v=1.0}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }
    </style>
</head>
<body>

<div class="operation-panel">
    <h2 class="operation-title">班级管理</h2>
    <div class="mb-4">
        <a href="/admin/index" class="btn btn-secondary">返回后台</a>
        <a href="/admin/user/manage" class="btn btn-primary">用户管理</a>
        <a href="/admin/teacher/manage" class="btn btn-primary">教师管理</a>
        <a href="/admin/student/manage" class="btn btn-primary">学生管理</a>
        <a href="/admin/class/manage" class="btn btn-nav-active">班级管理</a>
        <a href="/admin/class/add" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> 新增班级
        </a>
    </div>

    <!-- 统一标准搜索表单 -->
    <div class="search-form">
        <form th:action="@{/admin/class/manage}" method="get" class="row g-3" id="searchForm">
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-building"></i></span>
                    <input type="text" class="form-control" name="className"
                           th:value="${className}" placeholder="班级名称">
                </div>
            </div>
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-book"></i></span>
                    <select class="form-control" name="grade">
                        <option value="">全部年级</option>
                        <option value="大一" th:selected="${grade == '大一'}">大一</option>
                        <option value="大二" th:selected="${grade == '大二'}">大二</option>
                        <option value="大三" th:selected="${grade == '大三'}">大三</option>
                        <option value="大四" th:selected="${grade == '大四'}">大四</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-search"></i> 搜索
                </button>
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-secondary w-100" onclick="resetSearch()">
                    <i class="bi bi-arrow-clockwise"></i> 重置
                </button>
            </div>
        </form>
    </div>

    <!-- 班级列表 -->
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>#</th>
                <th>年级</th>
                <th>班级名称</th>
                <th>创建时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(page.records)}">
                <td colspan="5" class="text-center py-5">
                    <div class="empty-state">
                        <i class="bi bi-building" style="font-size: 48px;"></i>
                        <h4 class="mt-3 mb-2">暂无班级数据</h4>
                        <a href="/admin/class/add" class="btn btn-success mt-3">
                            <i class="bi bi-plus-circle"></i> 新增班级
                        </a>
                    </div>
                </td>
            </tr>
            <tr th:each="cls, stat : ${page.records}" th:unless="${#lists.isEmpty(page.records)}">
                <td th:text="${stat.count}"></td>
                <td><span class="badge bg-primary" th:text="${cls.grade}"></span></td>
                <td th:text="${cls.className}"></td>
                <td th:text="${#temporals.format(cls.createTime, 'yyyy-MM-dd')}"></td>
                <td>
                    <div class="action-buttons">
                        <a th:href="@{/admin/class/edit/{id}(id=${cls.id})}" class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil"></i> 编辑
                        </a>
                        <button class="btn btn-danger btn-sm" th:onclick="'deleteClass(' + ${cls.id} + ')'">
                            <i class="bi bi-trash"></i> 删除
                        </button>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 分页 -->
    <nav th:if="${page.pages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${page.current == 1} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/admin/class/manage(page=1)}">首页</a>
            </li>
            <li class="page-item" th:classappend="${page.current == 1} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/admin/class/manage(page=${page.current - 1})}">上一页</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(1, page.pages)}"
                th:classappend="${i == page.current} ? 'active' : ''">
                <a class="page-link" th:href="@{/admin/class/manage(page=${i})}" th:text="${i}"></a>
            </li>
            <li class="page-item" th:classappend="${page.current == page.pages} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/admin/class/manage(page=${page.current + 1})}">下一页</a>
            </li>
            <li class="page-item" th:classappend="${page.current == page.pages} ? 'disabled' : ''">
                <a class="page-link" th:href="@{/admin/class/manage(page=${page.pages})}">尾页</a>
            </li>
        </ul>
    </nav>
</div>

<script>
    function deleteClass(id) {
        if (confirm('确认删除该班级吗？删除后关联的教师和学生数据将受影响！')) {
            fetch('/admin/class/delete/' + id, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            })
                .then(res => res.json())
                .then(data => {
                    alert(data.message);
                    if (data.success) location.reload();
                })
                .catch(err => alert('操作失败：' + err.message));
        }
    }

    // 重置搜索条件
    function resetSearch() {
        const form = document.getElementById('searchForm');
        form.querySelectorAll('input, select').forEach(input => input.value = '');
        form.submit();
    }
</script>
</body>
</html>
