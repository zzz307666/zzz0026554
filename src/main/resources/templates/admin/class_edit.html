<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑班级 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .form-container {
            background: linear-gradient(135deg, #f6f8ff 0%, #f0f4ff 100%);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #e5e7eb;
        }
        .form-title {
            color: #4f46e5;
            font-weight: 700;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #4f46e5;
        }
        .required::after {
            content: " *";
            color: #ef4444;
        }
    </style>
</head>
<body>

<div class="operation-panel">
    <h2 class="operation-title">编辑班级</h2>
    <div class="mb-4">
        <a href="/admin/class/manage" class="btn btn-secondary">返回列表</a>
        <a href="/admin/index" class="btn btn-outline-secondary">返回后台</a>
    </div>

    <div class="form-container">
        <h4 class="form-title">编辑班级信息</h4>
        <form id="classForm" onsubmit="submitForm(event)">
            <input type="hidden" id="id" th:value="${sysClass.id}">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label required">所属年级</label>
                        <select class="form-control" id="grade" name="grade" required>
                            <option value="">请选择年级</option>
                            <option value="大一" th:selected="${sysClass.grade == '大一'}">大一</option>
                            <option value="大二" th:selected="${sysClass.grade == '大二'}">大二</option>
                            <option value="大三" th:selected="${sysClass.grade == '大三'}">大三</option>
                            <option value="大四" th:selected="${sysClass.grade == '大四'}">大四</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label required">班级名称</label>
                        <input type="text" class="form-control" id="className" name="className" required
                               th:value="${sysClass.className}">
                    </div>
                </div>
            </div>

            <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn btn-primary px-5" id="submitBtn">
                    <span id="submitText">保存修改</span>
                    <span id="loadingSpinner" class="loading-spinner" style="display: none; margin-left: 10px;"></span>
                </button>
                <a href="/admin/class/manage" class="btn btn-secondary px-5">取消</a>
            </div>
        </form>
    </div>
</div>

<script>
    function submitForm(event) {
        event.preventDefault();
        const formData = {
            id: document.getElementById('id').value,
            grade: document.getElementById('grade').value,
            className: document.getElementById('className').value
        };

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        document.getElementById('submitText').textContent = '保存中...';
        document.getElementById('loadingSpinner').style.display = 'inline-block';

        fetch('/admin/class/edit', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(formData)
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('修改成功！');
                    window.location.href = '/admin/class/manage';
                } else {
                    alert('修改失败：' + data.message);
                }
            })
            .catch(err => alert('请求失败：' + err.message))
            .finally(() => {
                submitBtn.disabled = false;
                document.getElementById('submitText').textContent = '保存修改';
                document.getElementById('loadingSpinner').style.display = 'none';
            });
    }
</script>
</body>
</html>
