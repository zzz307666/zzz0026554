<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .reset-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .reset-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .system-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
        }
        .logo-icon i {
            font-size: 28px;
            color: white;
        }
        .system-title {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .form-group {
            position: relative;
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f9fafb;
        }
        .form-control:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            background: white;
        }
        /* 统一按钮样式：大小、内边距、圆角完全一致，仅颜色不同 */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            display: inline-block;
            box-sizing: border-box;
        }
        .reset-btn {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            margin-top: 10px;
        }
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(79, 70, 229, 0.3);
            color: white;
            text-decoration: none;
        }
        .back-btn {
            background: #f3f4f6;
            color: #4f46e5;
            margin-top: 15px;
            border: 2px solid #e5e7eb;
        }
        .back-btn:hover {
            background: #e5e7eb;
            color: #4f46e5;
            text-decoration: none;
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
        }
        .success-tip {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border: 2px solid #10b981;
            color: #065f46;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
        }
        .error-tip {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border: 2px solid #f87171;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
        }
        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            justify-content: center;
        }
        .role-option {
            flex: 1;
            text-align: center;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .role-option.active {
            border-color: #4f46e5;
            background: #f0f4ff;
            font-weight: 600;
        }
        .role-option i {
            display: block;
            font-size: 20px;
            margin-bottom: 5px;
            color: #4f46e5;
        }
        /* 修复按钮禁用状态样式 */
        .reset-btn:disabled {
            background: linear-gradient(135deg, #a5b4fc 0%, #c7d2fe 100%);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
<div class="reset-bg">
    <div class="reset-card">
        <div class="system-logo">
            <div class="logo-icon">
                <i class="bi bi-key"></i>
            </div>
            <h1 class="system-title">密码重置</h1>
            <p class="text-muted text-center">请输入身份信息完成验证</p>
        </div>

        <!-- 状态提示 -->
        <div class="success-tip" th:if="${param.success}" style="display: block;">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span>验证通过！密码已重置为 abc123，请及时登录修改</span>
        </div>
        <div class="error-tip" th:if="${param.error}" style="display: block;">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${#strings.defaultString(param.msg[0], '身份信息验证失败，请检查后重试')}"></span>
        </div>

        <!-- 角色选择 -->
        <div class="role-selector">
            <div class="role-option active" data-role="student">
                <i class="bi bi-person-circle"></i>
                <div>学生</div>
            </div>
            <div class="role-option" data-role="teacher">
                <i class="bi bi-person-circle"></i>
                <div>教师</div>
            </div>
        </div>

        <!-- 验证表单 -->
        <form action="/reset-password/do-verify" method="post" id="verifyForm">
            <input type="hidden" name="roleType" id="roleType" value="student">

            <div class="form-group">
                <label class="form-label required">用户名</label>
                <input type="text" class="form-control" name="username" required placeholder="请输入登录用户名">
            </div>

            <div class="form-group">
                <label class="form-label required">真实姓名</label>
                <input type="text" class="form-control" name="realName" required placeholder="请输入真实姓名">
            </div>

            <div class="form-group" id="studentNoGroup">
                <label class="form-label required">学生学号</label>
                <input type="text" class="form-control" name="studentNo" required placeholder="请输入学生学号">
            </div>
            <div class="form-group" id="teacherNoGroup" style="display: none;">
                <label class="form-label required">教师工号</label>
                <input type="text" class="form-control" name="teacherNo" placeholder="请输入教师工号">
            </div>

            <button type="submit" class="btn reset-btn">验证并重置密码</button>
            <a href="/" class="btn back-btn">返回登录页</a>
        </form>
    </div>
</div>

<script>
    // 角色切换逻辑
    const roleOptions = document.querySelectorAll('.role-option');
    const roleTypeInput = document.getElementById('roleType');
    const studentNoGroup = document.getElementById('studentNoGroup');
    const teacherNoGroup = document.getElementById('teacherNoGroup');

    roleOptions.forEach(option => {
        option.addEventListener('click', () => {
            // 移除所有选中状态
            roleOptions.forEach(opt => opt.classList.remove('active'));
            // 添加当前选中状态
            option.classList.add('active');
            // 设置角色类型
            const role = option.getAttribute('data-role');
            roleTypeInput.value = role;

            // 切换学号/工号输入框
            if (role === 'student') {
                studentNoGroup.style.display = 'block';
                teacherNoGroup.style.display = 'none';
                studentNoGroup.querySelector('input').setAttribute('required', 'required');
                teacherNoGroup.querySelector('input').removeAttribute('required');
            } else {
                studentNoGroup.style.display = 'none';
                teacherNoGroup.style.display = 'block';
                teacherNoGroup.querySelector('input').setAttribute('required', 'required');
                studentNoGroup.querySelector('input').removeAttribute('required');
            }
        });
    });

    // 表单提交加载状态
    const verifyForm = document.getElementById('verifyForm');
    if (verifyForm) {
        verifyForm.addEventListener('submit', function(e) {
            const submitBtn = this.querySelector('.reset-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '验证中...';
        });
    }
</script>
</body>
</html>
