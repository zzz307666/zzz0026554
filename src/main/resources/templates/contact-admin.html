<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系管理员 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .contact-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .contact-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }
        .system-logo {
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
        }
        .logo-icon i {
            font-size: 28px;
            color: white;
        }
        .system-title {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .qrcode-container {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin: 20px 0 30px;
            display: inline-block;
        }
        .qrcode-img {
            width: 220px;
            height: 220px;
            object-fit: contain;
        }
        .tip-text {
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .back-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(79, 70, 229, 0.3);
            color: white;
        }
        .contact-info {
            margin-top: 20px;
            color: #6b7280;
            font-size: 14px;
        }
        .contact-info p {
            margin: 5px 0;
        }
        .contact-info i {
            color: #4f46e5;
            margin-right: 8px;
        }
    </style>
</head>
<body>
<div class="contact-bg">
    <div class="contact-card">
        <div class="system-logo">
            <div class="logo-icon">
                <i class="bi bi-headset"></i>
            </div>
            <h1 class="system-title">联系管理员</h1>
            <p class="text-muted">扫描二维码联系管理员开通账号</p>
        </div>

        <!-- 二维码展示（实际项目中替换为真实管理员二维码） -->
        <div class="qrcode-container">
            <img th:src="@{/image/admin01.png}" alt="管理员联系二维码" class="qrcode-img">
        </div>

        <div class="tip-text">
            <p>1. 扫描上方二维码添加管理员微信</p>
            <p>2. 提供姓名、身份（学生/教师）、所属单位信息</p>
            <p>3. 管理员审核后将为您开通账号</p>
        </div>

        <!-- 联系备用方式 -->
        <div class="contact-info">
            <p><i class="bi bi-envelope"></i> 备用邮箱：19838598329@163.com</p>
            <p><i class="bi bi-phone"></i> 联系电话：19838598329</p>
        </div>

        <!-- 返回登录页按钮 -->
        <a href="/" class="back-btn mt-3">返回登录页</a>
    </div>
</div>
</body>
</html>
