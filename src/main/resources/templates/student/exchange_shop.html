<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分商城 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .gift-card {
            transition: all 0.3s;
            border: 2px solid #e5e7eb;
        }
        .gift-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-color: #4f46e5;
        }
        .points-badge {
            font-size: 1.2rem;
            font-weight: bold;
            color: #f59e0b;
        }
        .stock-badge {
            position: absolute;
            top: 10px;
            right: 10px;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="mb-4">
        <a href="/student/index" class="btn btn-secondary">返回学生端</a>
        <a href="/student/exchange/my-orders" class="btn btn-outline-primary ms-2">
            <i class="bi bi-list-check"></i> 我的兑换
        </a>
        <h3 class="d-inline ms-3">🎁 积分商城</h3>
    </div>

    <!-- 学生积分信息 -->
    <div class="card mb-4 bg-gradient" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
        <div class="card-body">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h4>你好，<span th:text="${student.studentNo}">S2026001</span></h4>
                    <p class="mb-0">用积分兑换精美奖品，激励自己坚持运动！</p>
                </div>
                <div class="col-md-4 text-end">
                    <h2 class="mb-0">💰 <span id="currentPoints">--</span> 积分</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- 奖品列表 -->
    <div class="row" id="giftList">
        <div class="col-md-3 mb-4" th:each="gift : ${gifts}">
            <div class="card gift-card h-100">
                <div class="position-relative">
                    <div class="card-img-top bg-light d-flex align-items-center justify-content-center" 
                         style="height: 150px; background: #f3f4f6;">
                        <i class="bi bi-gift" style="font-size: 4rem; color: #9ca3af;"></i>
                    </div>
                    <span class="badge bg-success stock-badge" th:text="'库存:' + ${gift.stock}">库存:100</span>
                </div>
                <div class="card-body">
                    <h5 class="card-title" th:text="${gift.giftName}">运动水杯</h5>
                    <p class="card-text small text-muted" th:text="${gift.description}">高品质运动水杯</p>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="points-badge">
                            <i class="bi bi-coin"></i> <span th:text="${gift.pointsCost}">50</span> 积分
                        </span>
                        <span class="badge bg-info" th:text="${gift.category}">生活用品</span>
                    </div>
                    <button class="btn btn-primary w-100" 
                            th:onclick="'exchangeGift(' + ${gift.id} + ', ' + ${gift.pointsCost} + ')'">
                        <i class="bi bi-cart-plus"></i> 立即兑换
                    </button>
                </div>
            </div>
        </div>
        
        <div class="col-12" th:if="${#lists.isEmpty(gifts)}">
            <div class="text-center py-5 text-muted">
                <i class="bi bi-inbox" style="font-size: 4rem;"></i>
                <p class="mt-3">暂无可兑换的奖品，敬请期待！</p>
            </div>
        </div>
    </div>
</div>

<!-- 确认兑换模态框 -->
<div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">确认兑换</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>确定要兑换该奖品吗？</p>
                <p><strong>奖品名称：</strong><span id="confirmGiftName"></span></p>
                <p><strong>所需积分：</strong><span id="confirmPointsCost" class="text-danger"></span></p>
                <p class="text-muted small">兑换后将扣除相应积分，请前往指定地点领取奖品。</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="confirmExchange()">确认兑换</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
let currentGiftId = null;

// 页面加载时获取当前积分
document.addEventListener('DOMContentLoaded', function() {
    loadCurrentPoints();
});

function loadCurrentPoints() {
    fetch('/student/points/info')
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                document.getElementById('currentPoints').textContent = data.totalPoints || 0;
            }
        })
        .catch(error => {
            console.error('获取积分失败:', error);
        });
}

function exchangeGift(giftId, pointsCost) {
    currentGiftId = giftId;
    document.getElementById('confirmPointsCost').textContent = pointsCost + ' 积分';
    
    // 这里应该从卡片中获取奖品名称，简化处理
    document.getElementById('confirmGiftName').textContent = '该奖品';
    
    const modal = new bootstrap.Modal(document.getElementById('confirmModal'));
    modal.show();
}

function confirmExchange() {
    if (!currentGiftId) return;
    
    fetch('/student/exchange/do-exchange', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({giftId: currentGiftId})
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('兑换成功！请前往"我的兑换"查看记录并领取奖品。');
            window.location.reload();
        } else {
            alert('兑换失败：' + data.message);
        }
    })
    .catch(error => {
        alert('网络错误，请稍后重试');
        console.error('兑换异常:', error);
    });
}
</script>
</body>
</html>
