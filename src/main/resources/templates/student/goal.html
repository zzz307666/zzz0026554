<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的运动目标 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .goal-card {
            transition: all 0.3s;
            border-left: 4px solid #4f46e5;
        }
        .goal-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        .progress-bar-animated {
            animation: progress-bar-stripes 1s linear infinite;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <!-- 页面标题 -->
    <div class="mb-4 d-flex justify-content-between align-items-center">
        <div>
            <a href="/student/index" class="btn btn-secondary">返回首页</a>
            <h3 class="d-inline ms-3">🎯 我的运动目标</h3>
        </div>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addModal" 
                th:if="${activeCount < 3}" onclick="resetForm()">
            <i class="bi bi-plus-circle"></i> 创建新目标
        </button>
    </div>

    <!-- 统计信息 -->
    <div class="alert alert-info">
        <div class="row">
            <div class="col-md-4">
                <strong>活跃目标：</strong>
                <span class="badge bg-primary" th:text="${activeCount}">0</span> / 3
            </div>
            <div class="col-md-4">
                <strong>已完成：</strong>
                <span class="badge bg-success" th:text="${completedCount != null ? completedCount : 0}">0</span>
            </div>
            <div class="col-md-4">
                <strong>进行中：</strong>
                <span class="badge bg-warning" th:text="${progressCount != null ? progressCount : 0}">0</span>
            </div>
        </div>
    </div>

    <!-- 筛选条件 -->
    <div class="card mb-4">
        <div class="card-body">
            <form class="row g-3" method="get" action="/student/goal/list">
                <div class="col-md-6">
                    <select class="form-select" name="status">
                        <option value="">全部状态</option>
                        <option value="0" th:selected="${param.status != null and param.status[0] == '0'}">已取消</option>
                        <option value="1" th:selected="${param.status != null and param.status[0] == '1'}">进行中</option>
                        <option value="2" th:selected="${param.status != null and param.status[0] == '2'}">已完成</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <div class="d-grid gap-2 d-md-flex">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="bi bi-search"></i> 查询
                        </button>
                        <a href="/student/goal/list" class="btn btn-secondary">重置</a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- 目标列表 -->
    <div class="row" id="goalList">
        <div class="col-md-6 col-lg-4 mb-4" th:each="goal : ${page.records}">
            <div class="card goal-card h-100">
                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">
                        <span th:if="${goal.goalType == 'COUNT'}"><i class="bi bi-check-circle"></i> 次数目标</span>
                        <span th:if="${goal.goalType == 'DURATION'}"><i class="bi bi-clock"></i> 时长目标</span>
                        <span th:if="${goal.goalType == 'CALORIES'}"><i class="bi bi-fire"></i> 卡路里目标</span>
                    </h5>
                    <div>
                        <span th:if="${goal.status == 0}" class="badge bg-secondary">已取消</span>
                        <span th:if="${goal.status == 1}" class="badge bg-warning">进行中</span>
                        <span th:if="${goal.status == 2}" class="badge bg-success">已完成</span>
                    </div>
                </div>
                
                <div class="card-body">
                    <!-- 进度条 -->
                    <div class="mb-3">
                        <div class="d-flex justify-content-between mb-1">
                            <small class="text-muted">进度</small>
                            <small class="fw-bold">
                                <span th:text="${goal.currentValue}">0</span> / 
                                <span th:text="${goal.targetValue}">100</span>
                            </small>
                        </div>
                        <div class="progress" style="height: 20px;">
                            <div class="progress-bar progress-bar-striped progress-bar-animated"
                                 th:classappend="${goal.status == 2} ? 'bg-success' : 'bg-primary'"
                                 th:style="'width: ' + ${(goal.currentValue / goal.targetValue * 100) > 100 ? 100 : (goal.currentValue / goal.targetValue * 100)} + '%'"
                                 th:text="${#numbers.formatDecimal(goal.currentValue / goal.targetValue * 100, 1, 0)} + '%'">
                                50%
                            </div>
                        </div>
                    </div>

                    <!-- 目标信息 -->
                    <div class="mb-2">
                        <small class="text-muted">
                            <i class="bi bi-calendar"></i> 
                            周期：<span th:text="${goal.periodType}">MONTH</span>
                        </small>
                    </div>

                    <div class="mb-2">
                        <small class="text-muted">
                            <i class="bi bi-calendar-range"></i> 
                            <span th:text="${#temporals.format(goal.startDate, 'yyyy-MM-dd')}">2026-05-01</span>
                            至 
                            <span th:text="${#temporals.format(goal.endDate, 'yyyy-MM-dd')}">2026-05-31</span>
                        </small>
                    </div>

                    <div class="mb-2" th:if="${goal.rewardPoints != null and goal.rewardPoints > 0}">
                        <small class="text-success fw-bold">
                            <i class="bi bi-coin"></i> 奖励：<span th:text="${goal.rewardPoints}">10</span> 积分
                        </small>
                    </div>

                    <div class="mb-2" th:if="${goal.completedTime != null}">
                        <small class="text-success">
                            <i class="bi bi-check-circle-fill"></i> 
                            完成时间：<span th:text="${#temporals.format(goal.completedTime, 'yyyy-MM-dd HH:mm')}">2026-05-24 10:30</span>
                        </small>
                    </div>
                </div>

                <div class="card-footer bg-light">
                    <div class="btn-group w-100" th:if="${goal.status == 1}">
                        <button class="btn btn-sm btn-outline-primary" 
                                th:onclick="'updateProgress(' + ${goal.id} + ')'">
                            <i class="bi bi-arrow-up"></i> 更新进度
                        </button>
                        <button class="btn btn-sm btn-outline-warning" 
                                th:onclick="'cancelGoal(' + ${goal.id} + ')'">
                            <i class="bi bi-x-circle"></i> 取消
                        </button>
                    </div>
                    <div class="btn-group w-100" th:if="${goal.status == 0 or goal.status == 2}">
                        <button class="btn btn-sm btn-outline-danger" 
                                th:onclick="'deleteGoal(' + ${goal.id} + ')'">
                            <i class="bi bi-trash"></i> 删除
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12" th:if="${#lists.isEmpty(page.records)}">
            <div class="text-center py-5 text-muted">
                <i class="bi bi-bullseye" style="font-size: 3rem;"></i>
                <p class="mt-3">暂无目标，点击右上角创建</p>
            </div>
        </div>
    </div>

    <!-- 分页 -->
    <div class="d-flex justify-content-center mt-4" th:if="${!#lists.isEmpty(page.records)}">
        <nav aria-label="Page navigation">
            <ul class="pagination">
                <li class="page-item" th:classappend="${page.current == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/student/goal/list(page=${page.current - 1}, size=${page.size}, status=${param.status})}">上一页</a>
                </li>
                <li class="page-item disabled">
                    <span class="page-link">第 [[${page.current}]] / [[${page.pages}]] 页</span>
                </li>
                <li class="page-item" th:classappend="${page.current == page.pages} ? 'disabled'">
                    <a class="page-link" th:href="@{/student/goal/list(page=${page.current + 1}, size=${page.size}, status=${param.status})}">下一页</a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<!-- 创建目标模态框 -->
<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">创建运动目标</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="goalForm">
                    <div class="mb-3">
                        <label class="form-label">目标类型 <span class="text-danger">*</span></label>
                        <select class="form-select" name="goalType" required>
                            <option value="COUNT">次数目标（打卡次数）</option>
                            <option value="DURATION">时长目标（运动分钟数）</option>
                            <option value="CALORIES">卡路里目标（消耗卡路里）</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">目标值 <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" name="targetValue" required min="1" step="0.01">
                        <small class="text-muted">根据目标类型填写相应数值</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">周期类型</label>
                        <select class="form-select" name="periodType">
                            <option value="WEEK">周</option>
                            <option value="MONTH" selected>月</option>
                            <option value="SEMESTER">学期</option>
                        </select>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">开始日期</label>
                            <input type="date" class="form-control" name="startDate" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">结束日期</label>
                            <input type="date" class="form-control" name="endDate" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">奖励积分</label>
                        <input type="number" class="form-control" name="rewardPoints" value="10" min="0" step="0.01">
                        <small class="text-muted">达成目标后获得的积分奖励</small>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="createGoal()">创建</button>
            </div>
        </div>
    </div>
</div>

<!-- 更新进度模态框 -->
<div class="modal fade" id="progressModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">更新进度</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="progressForm">
                    <input type="hidden" name="goalId" id="progressGoalId">
                    <div class="mb-3">
                        <label class="form-label">当前完成值</label>
                        <input type="number" class="form-control" name="currentValue" required min="0" step="0.01">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitProgress()">更新</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
    // 设置默认日期
    $(document).ready(function() {
        const today = new Date().toISOString().split('T')[0];
        $('input[name="startDate"]').val(today);
        
        // 默认结束日期为月底
        const endOfMonth = new Date();
        endOfMonth.setMonth(endOfMonth.getMonth() + 1);
        endOfMonth.setDate(0);
        $('input[name="endDate"]').val(endOfMonth.toISOString().split('T')[0]);
    });

    // 重置表单
    function resetForm() {
        document.getElementById('goalForm').reset();
    }

    // 创建目标
    function createGoal() {
        const form = document.getElementById('goalForm');
        const formData = new FormData(form);
        
        const data = {
            goalType: formData.get('goalType'),
            targetValue: parseFloat(formData.get('targetValue')),
            periodType: formData.get('periodType'),
            startDate: formData.get('startDate'),
            endDate: formData.get('endDate'),
            rewardPoints: parseFloat(formData.get('rewardPoints')) || 0
        };

        fetch('/student/goal/create', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
            alert(result.message);
            if (result.success) {
                location.reload();
            }
        })
        .catch(error => alert('创建失败: ' + error.message));
    }

    // 更新进度
    function updateProgress(id) {
        document.getElementById('progressGoalId').value = id;
        new bootstrap.Modal(document.getElementById('progressModal')).show();
    }

    // 提交进度
    function submitProgress() {
        const id = document.getElementById('progressGoalId').value;
        const currentValue = document.querySelector('#progressForm input[name="currentValue"]').value;

        fetch(`/student/goal/progress/${id}?currentValue=${currentValue}`, {
            method: 'POST'
        })
        .then(response => response.json())
        .then(result => {
            alert(result.message);
            if (result.success) {
                location.reload();
            }
        })
        .catch(error => alert('更新失败: ' + error.message));
    }

    // 取消目标
    function cancelGoal(id) {
        if (!confirm('确定要取消此目标吗？')) {
            return;
        }

        fetch(`/student/goal/cancel/${id}`, {
            method: 'POST'
        })
        .then(response => response.json())
        .then(result => {
            alert(result.message);
            if (result.success) {
                location.reload();
            }
        })
        .catch(error => alert('取消失败: ' + error.message));
    }

    // 删除目标
    function deleteGoal(id) {
        if (!confirm('确定要删除此目标吗？此操作不可恢复！')) {
            return;
        }

        fetch(`/student/goal/delete/${id}`, {
            method: 'POST'
        })
        .then(response => response.json())
        .then(result => {
            alert(result.message);
            if (result.success) {
                location.reload();
            }
        })
        .catch(error => alert('删除失败: ' + error.message));
    }
</script>

</body>
</html>
