<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打卡提醒设置 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container mt-4">
    <!-- 返回按钮 -->
    <div class="mb-3">
        <a href="/student/index" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> 返回学生端
        </a>
        <h3 class="d-inline ms-3">⏰ 打卡提醒设置</h3>
    </div>

    <div class="row">
        <!-- 左侧：打卡统计 -->
        <div class="col-md-4">
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-graph-up"></i> 打卡统计</h5>
                </div>
                <div class="card-body">
                    <div class="text-center mb-3">
                        <h2 class="text-primary" th:text="${stats.totalCheckIns}">0</h2>
                        <p class="text-muted">累计打卡天数</p>
                    </div>
                    <hr>
                    <div class="row text-center">
                        <div class="col-6">
                            <h4 class="text-success" th:text="${stats.currentStreak}">0</h4>
                            <small class="text-muted">当前连续</small>
                        </div>
                        <div class="col-6">
                            <h4 class="text-warning" th:text="${stats.longestStreak}">0</h4>
                            <small class="text-muted">最长连续</small>
                        </div>
                    </div>
                    <hr>
                    <div class="row text-center">
                        <div class="col-6">
                            <h5 th:text="${stats.thisMonthCheckIns}">0</h5>
                            <small class="text-muted">本月打卡</small>
                        </div>
                        <div class="col-6">
                            <h5 class="text-danger" th:text="${stats.missedDays}">0</h5>
                            <small class="text-muted">未打卡天数</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 激励卡片 -->
            <div class="card bg-warning">
                <div class="card-body text-center">
                    <h5><i class="bi bi-trophy-fill"></i> 坚持就是胜利！</h5>
                    <p class="mb-0">连续打卡7天可获得徽章奖励</p>
                </div>
            </div>
        </div>

        <!-- 右侧：提醒设置 -->
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-bell"></i> 提醒配置</h5>
                </div>
                <div class="card-body">
                    <!-- 每日打卡提醒 -->
                    <div class="mb-4">
                        <h6 class="border-bottom pb-2">
                            <i class="bi bi-sunrise text-warning"></i> 每日打卡提醒
                        </h6>
                        <div class="row align-items-center">
                            <div class="col-md-4">
                                <label class="form-label">提醒时间</label>
                                <input type="time" class="form-control" id="dailyTime" value="07:00">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">启用状态</label>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="dailyEnabled" checked>
                                    <label class="form-check-label" for="dailyEnabled">启用</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">&nbsp;</label>
                                <button class="btn btn-primary d-block w-100" onclick="saveReminder('daily')">
                                    <i class="bi bi-save"></i> 保存
                                </button>
                            </div>
                        </div>
                        <div class="mt-2">
                            <label class="form-label">提醒消息</label>
                            <input type="text" class="form-control" id="dailyMessage" 
                                   value="早上好！别忘了今天的运动打卡哦~">
                        </div>
                    </div>

                    <hr>

                    <!-- 中断预警提醒 -->
                    <div class="mb-4">
                        <h6 class="border-bottom pb-2">
                            <i class="bi bi-exclamation-triangle text-danger"></i> 连续打卡中断预警
                        </h6>
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i> 
                            当您连续2天未打卡时，系统将发送提醒消息鼓励您继续坚持。
                        </div>
                        <div class="row align-items-center">
                            <div class="col-md-4">
                                <label class="form-label">提醒时间</label>
                                <input type="time" class="form-control" id="interruptTime" value="20:00">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">启用状态</label>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="interruptEnabled" checked>
                                    <label class="form-check-label" for="interruptEnabled">启用</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">&nbsp;</label>
                                <button class="btn btn-primary d-block w-100" onclick="saveReminder('interrupt')">
                                    <i class="bi bi-save"></i> 保存
                                </button>
                            </div>
                        </div>
                        <div class="mt-2">
                            <label class="form-label">提醒消息</label>
                            <input type="text" class="form-control" id="interruptMessage" 
                                   value="您已连续2天未打卡，坚持就是胜利！">
                        </div>
                    </div>

                    <hr>

                    <!-- 每周总结提醒 -->
                    <div class="mb-4">
                        <h6 class="border-bottom pb-2">
                            <i class="bi bi-calendar-week text-info"></i> 每周运动总结
                        </h6>
                        <div class="row align-items-center">
                            <div class="col-md-4">
                                <label class="form-label">提醒时间</label>
                                <input type="time" class="form-control" id="weeklyTime" value="21:00">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">启用状态</label>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="weeklyEnabled">
                                    <label class="form-check-label" for="weeklyEnabled">启用</label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">&nbsp;</label>
                                <button class="btn btn-primary d-block w-100" onclick="saveReminder('weekly')">
                                    <i class="bi bi-save"></i> 保存
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
    // 保存提醒配置
    function saveReminder(type) {
        let time, enabled, message;
        
        if (type === 'daily') {
            time = $('#dailyTime').val();
            enabled = $('#dailyEnabled').is(':checked');
            message = $('#dailyMessage').val();
        } else if (type === 'interrupt') {
            time = $('#interruptTime').val();
            enabled = $('#interruptEnabled').is(':checked');
            message = $('#interruptMessage').val();
        } else if (type === 'weekly') {
            time = $('#weeklyTime').val();
            enabled = $('#weeklyEnabled').is(':checked');
            message = '这是您本周的运动总结报告';
        }
        
        $.ajax({
            url: '/student/reminder/save',
            method: 'POST',
            data: {
                reminderType: type,
                reminderTime: time,
                isEnabled: enabled,
                messageTemplate: message
            },
            success: function(result) {
                if (result.success) {
                    alert('保存成功');
                } else {
                    alert('保存失败：' + result.message);
                }
            },
            error: function() {
                alert('保存失败，请稍后重试');
            }
        });
    }
</script>

</body>
</html>
