<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生页面 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
</head>
<body>

<div class="operation-panel">
    <h2 class="operation-title">学生个人中心</h2>
    <div class="mb-3">
        <span>当前登录：<b th:text="${realName}"></b>（学生）</span>
        <a href="/logout" class="btn btn-danger logout-btn">安全登出</a>
    </div>

    <div class="operation-card">
        <a href="/student/sport/checkin" class="card-item text-decoration-none">
            <div class="card-icon">🏃</div>
            <div class="card-text">运动打卡</div>
        </a>
        <a href="/student/sport/records" class="card-item text-decoration-none">
            <div class="card-icon">📋</div>
            <div class="card-text">打卡记录</div>
        </a>
        <a href="/student/points" class="card-item text-decoration-none">
            <div class="card-icon">⭐</div>
            <div class="card-text">我的积分</div>
        </a>
        <a href="/student/evaluation" class="card-item text-decoration-none">
            <div class="card-icon">📊</div>
            <div class="card-text">评价结果</div>
        </a>
        <a href="/sport/ranking" class="card-item text-decoration-none">
            <div class="card-icon">🏆</div>
            <div class="card-text">运动排名</div>
        </a>
        <a href="/student/exchange/shop" class="card-item text-decoration-none">
            <div class="card-icon">🎁</div>
            <div class="card-text">积分商城</div>
        </a>
        <a href="/student/visualization" class="card-item text-decoration-none">
            <div class="card-icon">📈</div>
            <div class="card-text">数据可视化</div>
        </a>
        <a href="/student/goal" class="card-item text-decoration-none">
            <div class="card-icon">🎯</div>
            <div class="card-text">运动目标</div>
        </a>
        <a href="/student/my-badges" class="card-item text-decoration-none">
            <div class="card-icon">🏅</div>
            <div class="card-text">我的徽章</div>
        </a>
        <a href="/student/reminder/settings" class="card-item text-decoration-none">
            <div class="card-icon">⏰</div>
            <div class="card-text">打卡提醒</div>
        </a>
        <a href="/student/health/knowledge" class="card-item text-decoration-none">
            <div class="card-icon">📚</div>
            <div class="card-text">健康知识</div>
        </a>
        <a href="/student/messages" class="card-item text-decoration-none">
            <div class="card-icon">📬</div>
            <div class="card-text">消息中心</div>
        </a>
    </div>
    <div class="mt-5">
        <a href="/" class="btn btn-secondary">退出到登录页</a>
    </div>
</div>

</body>
</html>
