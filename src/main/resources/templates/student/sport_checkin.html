<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运动打卡 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .checkin-container {
            max-width: 800px;
            margin: 40px auto;
        }
        .sport-type-card {
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .sport-type-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .sport-type-card.selected {
            border-color: #10b981;
            background-color: #f0fdf4;
        }
        .sport-icon {
            font-size: 2rem;
        }
    </style>
</head>
<body>

<div class="container checkin-container">
    <div class="mb-4">
        <a href="/student/index" class="btn btn-secondary">返回首页</a>
    </div>

    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0"><i class="bi bi-check-circle"></i> 运动打卡</h4>
        </div>
        <div class="card-body">
            <form id="checkinForm">
                <!-- 选择运动类型 -->
                <div class="mb-4">
                    <label class="form-label fw-bold">选择运动类型 <span class="text-danger">*</span></label>
                    <div class="row g-3" id="sportTypeList">
                        <div class="col-md-4 col-lg-3" th:each="type : ${sportTypes}">
                            <div class="card sport-type-card h-100" th:data-id="${type.id}" onclick="selectSportType(this)">
                                <div class="card-body text-center">
                                    <div class="sport-icon mb-2" th:text="${type.icon}">🏃</div>
                                    <h6 class="card-title" th:text="${type.typeName}">跑步</h6>
                                    <small class="text-muted" th:text="'基础积分: ' + ${type.basePoints}">基础积分: 10</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" id="sportTypeId" name="sportTypeId" required>
                </div>

                <!-- 运动数据输入 -->
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-bold">运动日期 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="recordDate" name="recordDate" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-bold">运动时长(分钟) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="duration" name="duration" 
                                   min="30" placeholder="最少30分钟" required>
                            <small class="text-muted">最少30分钟才能获得积分</small>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-bold">运动距离(米)</label>
                            <input type="number" class="form-control" id="distance" name="distance" 
                                   placeholder="可选，如：5000" step="0.01">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-bold">消耗卡路里</label>
                            <input type="number" class="form-control" id="calories" name="calories" 
                                   placeholder="可选，如：300">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-bold">步数</label>
                            <input type="number" class="form-control" id="steps" name="steps" 
                                   placeholder="可选">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-bold">平均心率</label>
                            <input type="number" class="form-control" id="heartRate" name="heartRate" 
                                   placeholder="可选，如：120">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">备注</label>
                    <textarea class="form-control" id="remark" name="remark" rows="3" 
                              placeholder="可选，记录运动感受等"></textarea>
                </div>

                <!-- 预估积分显示 -->
                <div class="alert alert-info" id="pointsPreview" style="display: none;">
                    <strong><i class="bi bi-star-fill"></i> 预估积分：</strong>
                    <span id="estimatedPoints" class="fs-4 text-success fw-bold">0</span> 分
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg" id="submitBtn">
                        <i class="bi bi-check-circle"></i> 提交打卡
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 今日已打卡记录 -->
    <div class="card shadow mt-4">
        <div class="card-header bg-light">
            <h5 class="mb-0"><i class="bi bi-list-check"></i> 今日已打卡</h5>
        </div>
        <div class="card-body" id="todayRecords">
            <div th:if="${#lists.isEmpty(todayRecords)}">
                <p class="text-muted text-center">暂无今日打卡记录</p>
            </div>
            <div th:unless="${#lists.isEmpty(todayRecords)}">
                <div class="table-responsive">
                    <table class="table table-sm">
                        <thead>
                            <tr>
                                <th>运动类型</th>
                                <th>时长(分钟)</th>
                                <th>距离(米)</th>
                                <th>状态</th>
                                <th>提交时间</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="record : ${todayRecords}">
                                <td th:text="${record.sportType.typeName}">跑步</td>
                                <td th:text="${record.duration}">30</td>
                                <td th:text="${record.distance != null ? record.distance : '-'}">-</td>
                                <td>
                                    <span th:if="${record.status == 0}" class="badge bg-warning">待审核</span>
                                    <span th:if="${record.status == 1}" class="badge bg-success">已通过</span>
                                    <span th:if="${record.status == 2}" class="badge bg-danger">未通过</span>
                                </td>
                                <td th:text="${#temporals.format(record.createTime, 'HH:mm:ss')}">12:00:00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
    // 设置默认日期为今天
    document.getElementById('recordDate').valueAsDate = new Date();

    // 选择运动类型
    function selectSportType(element) {
        // 移除其他选中状态
        document.querySelectorAll('.sport-type-card').forEach(card => {
            card.classList.remove('selected');
        });
        
        // 添加选中状态
        element.classList.add('selected');
        
        // 设置隐藏字段
        document.getElementById('sportTypeId').value = element.dataset.id;
        
        // 更新预估积分
        updateEstimatedPoints();
    }

    // 更新预估积分
    function updateEstimatedPoints() {
        const sportTypeId = document.getElementById('sportTypeId').value;
        const duration = document.getElementById('duration').value;
        
        if (sportTypeId && duration && duration >= 30) {
            // 这里简化计算，实际应该从后端获取
            const basePoints = 10; // 默认基础积分
            const coefficient = 1.0; // 默认系数
            const points = (basePoints * coefficient * (duration / 30)).toFixed(2);
            
            document.getElementById('estimatedPoints').textContent = points;
            document.getElementById('pointsPreview').style.display = 'block';
        } else {
            document.getElementById('pointsPreview').style.display = 'none';
        }
    }

    // 监听时长变化
    document.getElementById('duration').addEventListener('input', updateEstimatedPoints);

    // 表单提交
    document.getElementById('checkinForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const sportTypeId = document.getElementById('sportTypeId').value;
        if (!sportTypeId) {
            alert('请选择运动类型！');
            return;
        }

        const formData = {
            sportTypeId: parseInt(sportTypeId),
            recordDate: document.getElementById('recordDate').value,
            duration: parseInt(document.getElementById('duration').value),
            distance: parseFloat(document.getElementById('distance').value) || 0,
            calories: parseInt(document.getElementById('calories').value) || 0,
            steps: parseInt(document.getElementById('steps').value) || 0,
            heartRate: parseInt(document.getElementById('heartRate').value) || 0,
            remark: document.getElementById('remark').value
        };

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> 提交中...';

        fetch('/student/sport/submit', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('打卡成功！等待教师审核。');
                window.location.reload();
            } else {
                alert('打卡失败：' + data.message);
            }
        })
        .catch(error => {
            alert('请求失败：' + error.message);
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="bi bi-check-circle"></i> 提交打卡';
        });
    });
</script>

</body>
</html>
