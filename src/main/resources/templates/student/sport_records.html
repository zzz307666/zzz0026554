<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的打卡记录 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container mt-4">
    <div class="mb-4">
        <a href="/student/index" class="btn btn-secondary">返回首页</a>
        <a href="/student/sport/checkin" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> 新的打卡
        </a>
    </div>

    <!-- 统计卡片 -->
    <div class="row mb-4" id="statsCards">
        <div class="col-md-3">
            <div class="card bg-primary text-white">
                <div class="card-body text-center">
                    <h3 id="totalCount">0</h3>
                    <p class="mb-0">总打卡次数</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-success text-white">
                <div class="card-body text-center">
                    <h3 id="totalDuration">0</h3>
                    <p class="mb-0">总时长(分钟)</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-warning text-white">
                <div class="card-body text-center">
                    <h3 id="totalCalories">0</h3>
                    <p class="mb-0">总消耗(卡路里)</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-info text-white">
                <div class="card-body text-center">
                    <h3 id="totalPoints">0</h3>
                    <p class="mb-0">总积分</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-header bg-light">
            <h4 class="mb-0"><i class="bi bi-list-ul"></i> 打卡记录</h4>
        </div>
        <div class="card-body">
            <!-- 筛选条件 -->
            <form class="row g-3 mb-4" method="get" action="/student/sport/records">
                <div class="col-md-3">
                    <select class="form-select" name="status">
                        <option value="">全部状态</option>
                        <option value="0" th:selected="${status == 0}">待审核</option>
                        <option value="1" th:selected="${status == 1}">已通过</option>
                        <option value="2" th:selected="${status == 2}">已驳回</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <input type="date" class="form-control" name="startDate" placeholder="开始日期"
                           th:value="${startDate}">
                </div>
                <div class="col-md-3">
                    <input type="date" class="form-control" name="endDate" placeholder="结束日期"
                           th:value="${endDate}">
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> 查询
                    </button>
                </div>
            </form>

            <!-- 数据表格 -->
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>运动类型</th>
                            <th>运动日期</th>
                            <th>时长(分钟)</th>
                            <th>距离(米)</th>
                            <th>卡路里</th>
                            <th>获得积分</th>
                            <th>状态</th>
                            <th>审核备注</th>
                            <th>提交时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="record : ${page.records}">
                            <td th:text="${record.sportTypeName ?: '-'}">跑步</td>
                            <td th:text="${#temporals.format(record.recordDate, 'yyyy-MM-dd')}">2026-05-10</td>
                            <td th:text="${record.duration}">60</td>
                            <td th:text="${record.distance ?: 0}">5000</td>
                            <td th:text="${record.calories ?: 0}">300</td>
                            <td>
                                <span class="badge bg-success" th:text="${record.earnedPoints}">20.00</span>
                            </td>
                            <td>
                                <span th:if="${record.status == 0}" class="badge bg-warning">待审核</span>
                                <span th:if="${record.status == 1}" class="badge bg-success">已通过</span>
                                <span th:if="${record.status == 2}" class="badge bg-danger">已驳回</span>
                            </td>
                            <td th:text="${record.auditRemark ?: '-'}">-</td>
                            <td th:text="${#temporals.format(record.createTime, 'yyyy-MM-dd HH:mm')}">2026-05-10 08:00</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(page.records)}">
                            <td colspan="9" class="text-center text-muted py-4">暂无打卡记录</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- 分页 -->
            <nav th:if="${page.total > 0}">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${page.current == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/student/sport/records(page=${page.current - 1}, status=${status}, startDate=${startDate}, endDate=${endDate})}">上一页</a>
                    </li>
                    <li class="page-item disabled">
                        <span class="page-link">第 [[${page.current}]] / [[${page.pages}]] 页，共 [[${page.total}]] 条</span>
                    </li>
                    <li class="page-item" th:classappend="${page.current == page.pages} ? 'disabled'">
                        <a class="page-link" th:href="@{/student/sport/records(page=${page.current + 1}, status=${status}, startDate=${startDate}, endDate=${endDate})}">下一页</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
    // 加载统计数据
    fetch('/student/sport/stats')
        .then(response => response.json())
        .then(data => {
            if (data.success && data.data) {
                document.getElementById('totalCount').textContent = data.data.total_count || 0;
                document.getElementById('totalDuration').textContent = data.data.total_duration || 0;
                document.getElementById('totalCalories').textContent = data.data.total_calories || 0;
                document.getElementById('totalPoints').textContent = data.data.total_points || 0;
            }
        })
        .catch(error => console.error('加载统计失败:', error));
</script>

</body>
</html>
