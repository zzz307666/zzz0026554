<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级排名 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container mt-4">
    <div class="mb-4">
        <a href="/student/index" class="btn btn-secondary">返回首页</a>
    </div>

    <div class="card shadow">
        <div class="card-header bg-warning text-dark">
            <h4 class="mb-0"><i class="bi bi-trophy-fill"></i> 班级运动积分排行榜</h4>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 80px;">排名</th>
                            <th>姓名</th>
                            <th>学号</th>
                            <th>打卡次数</th>
                            <th>总积分</th>
                            <th>平均每次积分</th>
                        </tr>
                    </thead>
                    <tbody id="rankingTable">
                        <tr>
                            <td colspan="6" class="text-center text-muted py-4">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    // 从Thymeleaf获取班级ID
    const classId = /*[[${classId}]]*/ 1;
    
    // 加载排名数据（使用学生端自己的API）
    fetch('/student/ranking/data?classId=' + classId)
        .then(response => response.json())
        .then(result => {
            if (result.success && result.data) {
                renderRanking(result.data);
            } else {
                document.getElementById('rankingTable').innerHTML = 
                    '<tr><td colspan="6" class="text-center text-muted py-4">暂无排名数据</td></tr>';
            }
        })
        .catch(error => {
            console.error('加载排名失败:', error);
            document.getElementById('rankingTable').innerHTML = 
                '<tr><td colspan="6" class="text-center text-danger py-4">加载失败</td></tr>';
        });

    function renderRanking(data) {
        const tbody = document.getElementById('rankingTable');
        tbody.innerHTML = '';

        data.forEach((item, index) => {
            const rank = index + 1;
            let rankBadge = '';
            
            if (rank === 1) {
                rankBadge = '<span class="badge bg-warning text-dark fs-6">🥇 1</span>';
            } else if (rank === 2) {
                rankBadge = '<span class="badge bg-secondary fs-6">🥈 2</span>';
            } else if (rank === 3) {
                rankBadge = '<span class="badge bg-danger fs-6">🥉 3</span>';
            } else {
                rankBadge = `<span class="badge bg-light text-dark">${rank}</span>`;
            }

            const avgPoints = item.record_count > 0 ? 
                (item.total_points / item.record_count).toFixed(2) : 0;

            const row = `
                <tr>
                    <td>${rankBadge}</td>
                    <td><strong>${item.student_name}</strong></td>
                    <td>${item.class_name || '-'}</td>
                    <td>${item.record_count}</td>
                    <td><span class="badge bg-success fs-6">${item.total_points}</span></td>
                    <td>${avgPoints}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }
</script>

</body>
</html>
