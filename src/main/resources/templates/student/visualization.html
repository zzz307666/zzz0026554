<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人数据可视化 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .chart-container {
            position: relative;
            height: 350px;
            margin-bottom: 30px;
        }
        .stat-card {
            border-radius: 15px;
            transition: all 0.3s;
            overflow: hidden;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        .stat-icon {
            font-size: 2.5rem;
            opacity: 0.8;
        }
        .gradient-bg-1 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .gradient-bg-2 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        .gradient-bg-3 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; }
        .gradient-bg-4 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: white; }
    </style>
</head>
<body>

<div class="container-fluid mt-4">
    <div class="mb-4">
        <a href="/student/index" class="btn btn-secondary">返回学生中心</a>
        <h3 class="d-inline ms-3">📈 个人数据可视化</h3>
    </div>

    <!-- 月度统计卡片 -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card stat-card gradient-bg-1">
                <div class="card-body text-center">
                    <div class="stat-icon mb-2">🏃</div>
                    <h6 class="mb-2">总打卡次数</h6>
                    <h2 class="mb-0" id="totalCheckins">-</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card gradient-bg-2">
                <div class="card-body text-center">
                    <div class="stat-icon mb-2">⏱️</div>
                    <h6 class="mb-2">总运动时长</h6>
                    <h2 class="mb-0" id="totalDuration">-</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card gradient-bg-3">
                <div class="card-body text-center">
                    <div class="stat-icon mb-2">🔥</div>
                    <h6 class="mb-2">消耗卡路里</h6>
                    <h2 class="mb-0" id="totalCalories">-</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card gradient-bg-4">
                <div class="card-body text-center">
                    <div class="stat-icon mb-2">⭐</div>
                    <h6 class="mb-2">获得积分</h6>
                    <h2 class="mb-0" id="totalPoints">-</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- 图表区域 -->
    <div class="row">
        <!-- 运动趋势图 -->
        <div class="col-md-8 mb-4">
            <div class="card h-100">
                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">📊 最近30天运动趋势</h5>
                    <div>
                        <span class="badge bg-primary me-2">打卡次数</span>
                        <span class="badge bg-success">运动时长</span>
                    </div>
                </div>
                <div class="card-body">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 运动类型分布 -->
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                <div class="card-header bg-light">
                    <h5 class="mb-0">🎯 运动类型分布</h5>
                </div>
                <div class="card-body">
                    <canvas id="sportTypeChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 积分增长曲线 -->
        <div class="col-md-6 mb-4">
            <div class="card h-100">
                <div class="card-header bg-light">
                    <h5 class="mb-0">💰 积分增长趋势</h5>
                </div>
                <div class="card-body">
                    <canvas id="pointsChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 运动时长分布 -->
        <div class="col-md-6 mb-4">
            <div class="card h-100">
                <div class="card-header bg-light">
                    <h5 class="mb-0">⏰ 每日运动时长分布</h5>
                </div>
                <div class="card-body">
                    <canvas id="durationChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载提示 -->
    <div class="text-center py-5" id="loadingState">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">加载中...</span>
        </div>
        <p class="mt-3 text-muted">正在加载数据...</p>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<script>
    let trendChart = null;
    let sportTypeChart = null;
    let pointsChart = null;
    let durationChart = null;

    // 页面加载时获取数据
    window.onload = function() {
        loadAllData();
    };

    // 加载所有数据
    function loadAllData() {
        Promise.all([
            loadMonthlyStats(),
            loadTrendData(),
            loadSportTypeDistribution(),
            loadPointsWeeklyHistory(),
            loadTimeDistribution()
        ]).then(() => {
            document.getElementById('loadingState').style.display = 'none';
        }).catch(error => {
            console.error('加载数据失败:', error);
            alert('部分数据加载失败，请刷新页面重试');
        });
    }

    // 加载月度统计
    function loadMonthlyStats() {
        return fetch('/student/visualization/monthly-stats')
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    const data = result.data;
                    document.getElementById('totalCheckins').textContent = data.total_count || 0;
                    document.getElementById('totalDuration').textContent = Math.round(data.total_duration || 0) + '分钟';
                    document.getElementById('totalCalories').textContent = Math.round(data.total_calories || 0) + 'kcal';
                    document.getElementById('totalPoints').textContent = data.total_points || 0;
                }
            });
    }

    // 加载趋势数据
    function loadTrendData() {
        return fetch('/student/visualization/trend-data')
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    renderTrendChart(result.data);
                }
            });
    }

    // 渲染趋势图
    function renderTrendChart(data) {
        const ctx = document.getElementById('trendChart').getContext('2d');
        
        if (trendChart) {
            trendChart.destroy();
        }

        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.dates,
                datasets: [
                    {
                        label: '打卡次数',
                        data: data.counts,
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        tension: 0.4,
                        fill: true,
                        yAxisID: 'y'
                    },
                    {
                        label: '运动时长(分钟)',
                        data: data.durations,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        tension: 0.4,
                        fill: true,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false
                },
                scales: {
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: '打卡次数'
                        }
                    },
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        beginAtZero: true,
                        grid: {
                            drawOnChartArea: false
                        },
                        title: {
                            display: true,
                            text: '运动时长(分钟)'
                        }
                    }
                }
            }
        });
    }

    // 加载运动类型分布
    function loadSportTypeDistribution() {
        return fetch('/student/visualization/sport-type-distribution')
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    renderSportTypeChart(result.data);
                }
            });
    }

    // 渲染运动类型分布图
    function renderSportTypeChart(data) {
        const ctx = document.getElementById('sportTypeChart').getContext('2d');
        
        if (sportTypeChart) {
            sportTypeChart.destroy();
        }

        // 转换数据格式（这里简化处理，实际应该查询运动类型名称）
        const labels = Object.keys(data).map(key => '类型' + key);
        const values = Object.values(data);

        sportTypeChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.8)',
                        'rgba(54, 162, 235, 0.8)',
                        'rgba(255, 206, 86, 0.8)',
                        'rgba(75, 192, 192, 0.8)',
                        'rgba(153, 102, 255, 0.8)',
                        'rgba(255, 159, 64, 0.8)'
                    ],
                    borderWidth: 2,
                    borderColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });
    }

    // 加载积分周增长历史
    function loadPointsWeeklyHistory() {
        return fetch('/student/visualization/points-weekly-history')
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    renderPointsChart(result.data);
                }
            });
    }

    // 渲染积分图表
    function renderPointsChart(data) {
        const ctx = document.getElementById('pointsChart').getContext('2d');
        
        if (pointsChart) {
            pointsChart.destroy();
        }

        pointsChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.weeks,
                datasets: [{
                    label: '累计积分',
                    data: data.points,
                    backgroundColor: 'rgba(79, 70, 229, 0.8)',
                    borderColor: '#4f46e5',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    }

    // 加载时段分布数据
    function loadTimeDistribution() {
        return fetch('/student/visualization/time-distribution')
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    renderDurationChart(result.data);
                }
            });
    }

    // 渲染时长分布图
    function renderDurationChart(data) {
        const ctx = document.getElementById('durationChart').getContext('2d');
        
        if (durationChart) {
            durationChart.destroy();
        }

        const labels = Object.keys(data);
        const values = Object.values(data);

        durationChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: labels,
                datasets: [{
                    label: '运动时长分布(分钟)',
                    data: values,
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    borderColor: 'rgba(255, 99, 132, 1)',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: {
                        beginAtZero: true
                    }
                }
            }
        });
    }
</script>

</body>
</html>
