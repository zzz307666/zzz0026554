<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运动健康知识库 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .article-card {
            transition: all 0.3s;
            height: 100%;
        }
        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .category-badge {
            font-size: 12px;
            padding: 4px 10px;
        }
    </style>
</head>
<body>

<div class="container-fluid mt-4">
    <!-- 页面标题 -->
    <div class="mb-4">
        <a href="/student/index" class="btn btn-secondary">返回学生端</a>
        <h3 class="d-inline ms-3">📚 运动健康知识库</h3>
    </div>

    <div class="row">
        <!-- 左侧文章列表 -->
        <div class="col-md-9">
            <!-- 分类筛选 -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="d-flex gap-2 flex-wrap">
                        <a th:href="@{/student/health/knowledge}" 
                           class="btn" 
                           th:classappend="${currentCategory == null} ? 'btn-primary' : 'btn-outline-secondary'">
                            全部
                        </a>
                        <a th:href="@{/student/health/knowledge(category='运动科普')}" 
                           class="btn"
                           th:classappend="${currentCategory == '运动科普'} ? 'btn-primary' : 'btn-outline-secondary'">
                            🏃 运动科普
                        </a>
                        <a th:href="@{/student/health/knowledge(category='健康饮食')}" 
                           class="btn"
                           th:classappend="${currentCategory == '健康饮食'} ? 'btn-primary' : 'btn-outline-secondary'">
                            🥗 健康饮食
                        </a>
                        <a th:href="@{/student/health/knowledge(category='损伤预防')}" 
                           class="btn"
                           th:classappend="${currentCategory == '损伤预防'} ? 'btn-primary' : 'btn-outline-secondary'">
                            🩹 损伤预防
                        </a>
                        <a th:href="@{/student/health/knowledge(category='专家问答')}" 
                           class="btn"
                           th:classappend="${currentCategory == '专家问答'} ? 'btn-primary' : 'btn-outline-secondary'">
                            💬 专家问答
                        </a>
                    </div>
                </div>
            </div>

            <!-- 文章卡片列表 -->
            <div class="row g-4">
                <div class="col-md-6 col-lg-4" th:each="article : ${page.records}">
                    <div class="card article-card">
                        <div class="card-body">
                            <span class="badge bg-primary category-badge mb-2" th:text="${article.category}">分类</span>
                            <h5 class="card-title" th:text="${article.title}">文章标题</h5>
                            <p class="card-text text-muted small" th:text="${article.summary}">文章摘要...</p>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <small class="text-muted">
                                    <i class="bi bi-eye"></i> <span th:text="${article.viewCount}">0</span>
                                </small>
                                <a th:href="@{'/student/health/article/' + ${article.id}}" class="btn btn-sm btn-outline-primary">
                                    阅读全文 <i class="bi bi-arrow-right"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 分页 -->
            <nav aria-label="Page navigation" class="mt-4" th:if="${page.pages > 1}">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${page.current == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/student/health/knowledge(page=${page.current - 1}, category=${currentCategory})}">上一页</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(1, page.pages)}"
                        th:classappend="${i == page.current} ? 'active'">
                        <a class="page-link" th:href="@{/student/health/knowledge(page=${i}, category=${currentCategory})}" th:text="${i}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${page.current == page.pages} ? 'disabled'">
                        <a class="page-link" th:href="@{/student/health/knowledge(page=${page.current + 1}, category=${currentCategory})}">下一页</a>
                    </li>
                </ul>
            </nav>
        </div>

        <!-- 右侧热门文章 -->
        <div class="col-md-3">
            <div class="card">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0"><i class="bi bi-fire"></i> 热门文章</h5>
                </div>
                <div class="list-group list-group-flush">
                    <a th:each="article, stat : ${hotArticles}"
                       th:href="@{'/student/health/article/' + ${article.id}}"
                       class="list-group-item list-group-item-action">
                        <div class="d-flex w-100 justify-content-between">
                            <h6 class="mb-1" th:text="${article.title}">文章标题</h6>
                            <small class="text-muted">#<span th:text="${stat.count}">1</span></small>
                        </div>
                        <small class="text-muted">
                            <i class="bi bi-eye"></i> <span th:text="${article.viewCount}">0</span> 次阅读
                        </small>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>

</body>
</html>
