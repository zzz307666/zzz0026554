<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的徽章墙 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <style>
        .badge-card {
            transition: all 0.3s;
            border: 2px solid #e5e7eb;
        }
        .badge-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .badge-icon {
            font-size: 4rem;
            margin: 20px 0;
        }
        .badge-copper { color: #cd7f32; }
        .badge-silver { color: #c0c0c0; }
        .badge-gold { color: #ffd700; }
        .badge-platinum { color: #e5e4e2; }
        .locked {
            opacity: 0.4;
            filter: grayscale(100%);
        }
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <!-- 页面标题 -->
    <div class="mb-4">
        <a href="/student/index" class="btn btn-secondary">返回首页</a>
        <h3 class="d-inline ms-3">🏆 我的徽章墙</h3>
    </div>

    <!-- 统计信息 -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card stats-card">
                <div class="card-body text-center">
                    <h2 th:text="${#lists.size(page.records)}">0</h2>
                    <p class="mb-0">已获得徽章</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stats-card">
                <div class="card-body text-center">
                    <h2 th:text="${#lists.size(allBadges)}">0</h2>
                    <p class="mb-0">总徽章数</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stats-card">
                <div class="card-body text-center">
                    <h2 th:text="${(#lists.size(allBadges) > 0) ? (#lists.size(page.records) * 100 / #lists.size(allBadges)) : 0} + '%'">0%</h2>
                    <p class="mb-0">收集进度</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选标签 -->
    <ul class="nav nav-pills mb-4" id="badgeFilter">
        <li class="nav-item">
            <a class="nav-link active" data-filter="all" href="#">全部</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-filter="copper" href="#">铜牌</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-filter="silver" href="#">银牌</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-filter="gold" href="#">金牌</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" data-filter="platinum" href="#">白金</a>
        </li>
    </ul>

    <!-- 徽章展示 -->
    <div class="row" id="badgeWall">
        <!-- 已获得的徽章 -->
        <div class="col-md-4 col-lg-3 mb-4" th:each="studentBadge : ${page.records}" 
             th:with="badge=${@achievementBadgeServiceImpl.getBadgeById(studentBadge.badgeId)}">
            <div class="card badge-card h-100" th:classappend="'badge-' + ${badge.level}">
                <div class="card-body text-center">
                    <div class="badge-icon" th:classappend="'badge-' + ${badge.level}">
                        <i class="bi bi-award-fill"></i>
                    </div>
                    <h5 class="card-title" th:text="${badge.badgeName}">徽章名称</h5>
                    <p class="card-text text-muted small" th:text="${badge.description}">徽章描述</p>
                    
                    <div class="mt-3">
                        <span class="badge bg-warning" th:if="${badge.level == 'COPPER'}">铜牌</span>
                        <span class="badge bg-secondary" th:if="${badge.level == 'SILVER'}">银牌</span>
                        <span class="badge bg-warning text-dark" th:if="${badge.level == 'GOLD'}">金牌</span>
                        <span class="badge bg-light text-dark" th:if="${badge.level == 'PLATINUM'}">白金</span>
                    </div>

                    <div class="mt-2 small text-success" th:if="${badge.rewardPoints > 0}">
                        <i class="bi bi-coin"></i> +<span th:text="${badge.rewardPoints}">10</span> 积分
                    </div>

                    <div class="mt-2 small text-muted">
                        <i class="bi bi-calendar-check"></i> 
                        <span th:text="${#temporals.format(studentBadge.awardedTime, 'yyyy-MM-dd')}">2026-05-24</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 未获得的徽章（显示为锁定状态） -->
        <div class="col-md-4 col-lg-3 mb-4 locked" 
             th:each="badge : ${allBadges}"
             th:unless="${#lists.contains(earnedBadgeIds, badge.id)}">
            <div class="card badge-card h-100">
                <div class="card-body text-center">
                    <div class="badge-icon text-muted">
                        <i class="bi bi-lock-fill"></i>
                    </div>
                    <h5 class="card-title text-muted" th:text="${badge.badgeName}">徽章名称</h5>
                    <p class="card-text text-muted small" th:text="${badge.description}">徽章描述</p>
                    
                    <div class="mt-3">
                        <span class="badge bg-secondary">未获得</span>
                    </div>

                    <div class="mt-2 small text-muted">
                        <i class="bi bi-info-circle"></i> 继续努力解锁
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 分页 -->
    <div class="d-flex justify-content-center mt-4" th:if="${!#lists.isEmpty(page.records)}">
        <nav aria-label="Page navigation">
            <ul class="pagination">
                <li class="page-item" th:classappend="${page.current == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/badge/my-badges(page=${page.current - 1}, size=${page.size})}">上一页</a>
                </li>
                <li class="page-item disabled">
                    <span class="page-link">第 [[${page.current}]] / [[${page.pages}]] 页</span>
                </li>
                <li class="page-item" th:classappend="${page.current == page.pages} ? 'disabled'">
                    <a class="page-link" th:href="@{/badge/my-badges(page=${page.current + 1}, size=${page.size})}">下一页</a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- 空状态 -->
    <div class="text-center py-5" th:if="${#lists.isEmpty(page.records) and #lists.isEmpty(allBadges)}">
        <i class="bi bi-emoji-frown" style="font-size: 4rem; color: #ccc;"></i>
        <p class="mt-3 text-muted">暂无徽章，继续运动解锁成就吧！</p>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
    // 徽章筛选功能
    $(document).ready(function() {
        $('#badgeFilter a').click(function(e) {
            e.preventDefault();
            
            // 更新激活状态
            $('#badgeFilter a').removeClass('active');
            $(this).addClass('active');
            
            const filter = $(this).data('filter');
            
            if (filter === 'all') {
                $('.badge-card').parent().show();
            } else {
                $('.badge-card').parent().hide();
                $('.badge-' + filter).parent().show();
            }
        });
    });
</script>

</body>
</html>
