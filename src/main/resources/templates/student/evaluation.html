<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评价结果 - 运动评估系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
</head>
<body>

<div class="container mt-4">
    <div class="mb-4">
        <a href="/student/index" class="btn btn-secondary">返回首页</a>
    </div>

    <div class="card shadow mb-4">
        <div class="card-header bg-light">
            <h4 class="mb-0"><i class="bi bi-clipboard-data"></i> 我的评价结果</h4>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(evaluations)}" class="text-center text-muted py-5">
                <i class="bi bi-inbox" style="font-size: 3rem;"></i>
                <p class="mt-3">暂无评价记录</p>
            </div>

            <div th:each="eval : ${evaluations}" class="mb-4">
                <div class="card border">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">
                            <span th:text="${eval.evaluationPeriod}">2024-2025-1</span>
                            <span class="badge ms-2" 
                                  th:classappend="${eval.gradeLevel == '优秀'} ? 'bg-success' : (${eval.gradeLevel == '良好'} ? 'bg-info' : 'bg-warning')"
                                  th:text="${eval.gradeLevel}">良好</span>
                        </h5>
                        <small class="text-muted" th:text="${#temporals.format(eval.createTime, 'yyyy-MM-dd')}">2026-05-10</small>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <h6 class="fw-bold mb-3">5维指标评分</h6>
                                <table class="table table-sm">
                                    <tbody>
                                        <tr>
                                            <td>耐力</td>
                                            <td class="text-end">
                                                <span class="badge bg-primary" th:text="${eval.enduranceScore}">85.00</span>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td>力量</td>
                                            <td class="text-end">
                                                <span class="badge bg-primary" th:text="${eval.strengthScore}">78.00</span>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td>速度</td>
                                            <td class="text-end">
                                                <span class="badge bg-primary" th:text="${eval.speedScore}">92.00</span>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td>柔韧</td>
                                            <td class="text-end">
                                                <span class="badge bg-primary" th:text="${eval.flexibilityScore}">70.00</span>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td>协调</td>
                                            <td class="text-end">
                                                <span class="badge bg-primary" th:text="${eval.coordinationScore}">88.00</span>
                                            </td>
                                        </tr>
                                        <tr class="table-light fw-bold">
                                            <td>综合总分</td>
                                            <td class="text-end">
                                                <span class="badge bg-success fs-6" th:text="${eval.totalScore}">83.20</span>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div class="col-md-6">
                                <h6 class="fw-bold mb-3">雷达图</h6>
                                <canvas th:id="'radarChart_' + ${eval.id}" width="300" height="300"></canvas>
                            </div>
                        </div>

                        <div class="mt-3" th:if="${eval.teacherComment != null and !#strings.isEmpty(eval.teacherComment)}">
                            <h6 class="fw-bold">教师评语</h6>
                            <div class="alert alert-light border">
                                <p class="mb-0" th:text="${eval.teacherComment}">继续保持，表现不错！</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    // 为每个评价生成雷达图
    /*[# th:each="eval : ${evaluations}"]*/
    const ctx_[[${eval.id}]] = document.getElementById('radarChart_[[${eval.id}]]').getContext('2d');
    new Chart(ctx_[[${eval.id}]], {
        type: 'radar',
        data: {
            labels: ['耐力', '力量', '速度', '柔韧', '协调'],
            datasets: [{
                label: '评分',
                data: [
                    [[${eval.enduranceScore}]],
                    [[${eval.strengthScore}]],
                    [[${eval.speedScore}]],
                    [[${eval.flexibilityScore}]],
                    [[${eval.coordinationScore}]]
                ],
                backgroundColor: 'rgba(54, 162, 235, 0.2)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 2,
                pointBackgroundColor: 'rgba(54, 162, 235, 1)'
            }]
        },
        options: {
            responsive: true,
            scales: {
                r: {
                    beginAtZero: true,
                    max: 100,
                    ticks: {
                        stepSize: 20
                    }
                }
            },
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });
    /*[/]*/
</script>

</body>
</html>
